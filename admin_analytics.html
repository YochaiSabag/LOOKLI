<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKLI Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#080810;--s1:#0e0e1a;--s2:#141422;--s3:#1c1c2e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--p:#a78bfa;--p2:#7c3aed;--g:#34d399;--pk:#f472b6;--bl:#60a5fa;--yw:#fbbf24;--text:#f0eeff;--muted:#6b7280;--muted2:#9ca3af;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(124,58,237,0.12) 0%,transparent 55%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(167,139,250,0.07) 0%,transparent 50%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:32px 24px;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{font-size:22px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-tag{font-family:'Space Mono',monospace;font-size:10px;color:var(--p);background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);padding:3px 8px;border-radius:4px;letter-spacing:1px;}

/* realtime badge */
.realtime-badge{display:flex;align-items:center;gap:8px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);padding:6px 14px;border-radius:20px;}
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,211,153,0.4);}50%{opacity:.7;box-shadow:0 0 0 5px rgba(52,211,153,0);}}
.rt-text{font-size:12px;font-weight:700;color:var(--g);letter-spacing:.5px;}
.rt-source{font-size:10px;color:rgba(52,211,153,0.6);font-family:'Space Mono',monospace;}

.controls{display:flex;align-items:center;gap:10px;}
.period-btn{font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);color:var(--muted2);cursor:pointer;transition:all .2s;}
.period-btn.active,.period-btn:hover{background:var(--p2);color:#fff;border-color:var(--p);}
.refresh-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
.refresh-btn:hover{color:var(--p);border-color:var(--p);}
.refresh-btn.spinning{animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* kpis */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:22px 20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px);}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;filter:blur(40px);opacity:.25;}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.kpi-val{font-size:38px;font-weight:900;line-height:1;}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px;}

/* chart card - full width */
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:20px;}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.chart-card-title{font-size:15px;font-weight:700;}
.chart-canvas-wrap{position:relative;height:200px;}

/* bottom grid - side by side */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:24px;display:flex;flex-direction:column;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0;}
.card-title{font-size:14px;font-weight:700;}
.card-badge{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);background:var(--s3);padding:3px 8px;border-radius:4px;}
.card-scroll{overflow-y:auto;flex:1;}
.card-scroll::-webkit-scrollbar{width:4px;}
.card-scroll::-webkit-scrollbar-track{background:transparent;}
.card-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* stores */
.store-list{display:flex;flex-direction:column;gap:14px;padding-right:2px;}
.store-item{display:flex;flex-direction:column;gap:7px;}
.store-top{display:flex;align-items:center;justify-content:space-between;}
.store-name-row{display:flex;align-items:center;gap:8px;}
.store-meta{display:flex;align-items:center;gap:8px;}
.store-clicks{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--p);}
.store-pct{font-size:12px;color:var(--muted);}
.store-track{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.store-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--p),var(--bl));transition:width 1s cubic-bezier(.34,1.56,.64,1);}
.reset-store-btn{font-size:10px;color:var(--muted);background:none;border:1px solid transparent;cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .2s;font-family:'Heebo',sans-serif;}
.reset-store-btn:hover{color:var(--pk);background:rgba(244,114,182,.1);border-color:rgba(244,114,182,.2);}

/* products table */
.products-table{width:100%;border-collapse:collapse;}
.products-table th{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:0 8px 12px;text-align:right;font-weight:600;border-bottom:1px solid var(--border);}
.products-table td{padding:12px 8px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.products-table tr:last-child td{border-bottom:none;}
.products-table tr:hover td{background:rgba(255,255,255,.02);}
.prod-rank{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);width:24px;}
.prod-title-cell{max-width:0;width:99%;}
.prod-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;display:block;}
.prod-title a{color:var(--text);text-decoration:none;}
.prod-title a:hover{color:var(--p);}
.prod-store-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.store-chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px;}
.chip-MIMA{background:rgba(96,165,250,.15);color:#60a5fa;}
.chip-MEKIMI{background:rgba(167,139,250,.15);color:#a78bfa;}
.chip-LICHI{background:rgba(244,114,182,.15);color:#f472b6;}
.chip-AVIYAH{background:rgba(52,211,153,.15);color:#34d399;}
.chip-CHEMISE{background:rgba(251,191,36,.15);color:#fbbf24;}
.chip-default{background:var(--s3);color:var(--muted2);}
.prod-clicks-cell{white-space:nowrap;text-align:left;}
.prod-clicks{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--p);}
.prod-time{font-size:10px;color:var(--muted);display:block;margin-top:1px;}

/* misc */
.danger-btn{font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;padding:7px 14px;border-radius:8px;cursor:pointer;border:1px solid rgba(244,114,182,.3);background:rgba(244,114,182,.08);color:var(--pk);transition:all .2s;}
.danger-btn:hover{background:rgba(244,114,182,.18);border-color:var(--pk);}
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:14px;color:var(--muted);font-size:14px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;}

/* confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--s2);border:1px solid var(--border2);border-radius:16px;padding:32px;max-width:360px;width:90%;text-align:center;}
.confirm-box h3{font-size:18px;font-weight:800;margin-bottom:10px;}
.confirm-box p{font-size:14px;color:var(--muted2);margin-bottom:24px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.btn-cancel{padding:10px 20px;border-radius:8px;border:1px solid var(--border2);background:var(--s3);color:var(--muted2);cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;}
.btn-confirm{padding:10px 20px;border-radius:8px;border:none;background:var(--pk);color:#fff;cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;}

@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr);}.bottom-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">LOOKLI</div>
      <span class="brand-tag">ANALYTICS</span>
      <div class="realtime-badge">
        <div class="rt-dot"></div>
        <span class="rt-text">LIVE</span>
        <span class="rt-source">Google Analytics 4</span>
      </div>
    </div>
    <div class="controls">
      <button class="period-btn active" onclick="setPeriod(7,this)">7 ימים</button>
      <button class="period-btn" onclick="setPeriod(28,this)">28 ימים</button>
      <button class="period-btn" onclick="setPeriod(90,this)">90 ימים</button>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻</button>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow">
    <div class="state-box" style="grid-column:1/-1"><div class="spinner"></div><span>טוען נתונים מ-Google Analytics...</span></div>
  </div>

  <!-- Chart full width -->
  <div class="chart-card" id="chartCard" style="display:none">
    <div class="chart-card-header">
      <div class="chart-card-title">כניסות יומיות לאתר</div>
      <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)" id="chartUpd">—</span>
    </div>
    <div class="chart-canvas-wrap">
      <canvas id="sessionsChart"></canvas>
    </div>
  </div>

  <!-- Bottom: stores + products side by side -->
  <div class="bottom-grid" id="bottomGrid" style="display:none">

    <!-- Stores -->
    <div class="card" style="max-height:520px">
      <div class="card-header">
        <div class="card-title">קליקים לפי חנות</div>
        <button class="danger-btn" onclick="confirmReset(null)">איפוס הכל</button>
      </div>
      <div class="card-scroll">
        <div class="store-list" id="storeList"></div>
      </div>
    </div>

    <!-- Products -->
    <div class="card" style="max-height:520px">
      <div class="card-header">
        <div class="card-title">מוצרים שנלחצו</div>
        <span class="card-badge" id="prodCount">—</span>
      </div>
      <div class="card-scroll">
        <table class="products-table">
          <thead>
            <tr>
              <th>#</th>
              <th>מוצר</th>
              <th style="text-align:left;white-space:nowrap">קליקים</th>
            </tr>
          </thead>
          <tbody id="prodBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Confirm -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>⚠️ איפוס נתונים</h3>
    <p id="confirmMsg">האם אתה בטוח? פעולה זו אינה הפיכה.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">ביטול</button>
      <button class="btn-confirm" onclick="doReset()">איפוס</button>
    </div>
  </div>
</div>

<script>
let currentDays=7, pendingResetStore=undefined, chartInst=null;

function setPeriod(d,btn){
  currentDays=d;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadAll();
}

async function loadAll(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try{
    const [r1,r2]=await Promise.all([
      fetch(`/api/analytics?days=${currentDays}`),
      fetch('/api/clicks/stats')
    ]);
    if(!r1.ok) throw new Error(await r1.text());
    const ga4=await r1.json();
    const db=r2.ok?await r2.json():null;
    render(ga4,db);
  }catch(e){
    document.getElementById('kpiRow').innerHTML=`<div style="grid-column:1/-1;background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.2);border-radius:10px;padding:20px;color:var(--pk);text-align:center">שגיאה: ${e.message}</div>`;
  }finally{
    btn.classList.remove('spinning');
  }
}

function render(ga4,db){
  const {totals,daily,stores,topProducts}=ga4;
  const totalClicks=stores.reduce((s,x)=>s+x.clicks,0)||parseInt(totals.outboundClicks)||0;

  // KPIs
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi"><div class="kpi-glow" style="background:var(--p)"></div><div class="kpi-label">כניסות לאתר</div><div class="kpi-val" style="color:var(--p)">${fmt(totals.sessions)}</div><div class="kpi-sub">ב-${currentDays} ימים · GA4</div></div>
    <div class="kpi"><div class="kpi-glow" style="background:var(--g)"></div><div class="kpi-label">משתמשים ייחודיים</div><div class="kpi-val" style="color:var(--g)">${fmt(totals.users)}</div><div class="kpi-sub">גולשים שונים · GA4</div></div>
    <div class="kpi"><div class="kpi-glow" style="background:var(--pk)"></div><div class="kpi-label">קליקים לחנויות</div><div class="kpi-val" style="color:var(--pk)">${fmt(totalClicks)}</div><div class="kpi-sub">יציאות לרכישה</div></div>
    <div class="kpi"><div class="kpi-glow" style="background:var(--bl)"></div><div class="kpi-label">צפיות בעמוד</div><div class="kpi-val" style="color:var(--bl)">${fmt(totals.pageViews)}</div><div class="kpi-sub">סה"כ צפיות · GA4</div></div>
  `;

  // Chart
  document.getElementById('chartCard').style.display='';
  document.getElementById('chartUpd').textContent='עודכן '+new Date().toLocaleTimeString('he-IL');
  renderChart(daily||[]);

  // Bottom
  document.getElementById('bottomGrid').style.display='';

  // Stores
  document.getElementById('storeList').innerHTML=stores.length?stores.map(s=>{
    const pct=totalClicks>0?Math.round(s.clicks/totalClicks*100):0;
    return `<div class="store-item">
      <div class="store-top">
        <div class="store-name-row">
          <span class="store-chip ${getChip(s.name)}">${s.name}</span>
          <button class="reset-store-btn" onclick="confirmReset('${s.name}')">איפוס</button>
        </div>
        <div class="store-meta">
          <span class="store-clicks">${fmt(s.clicks)}</span>
          <span class="store-pct">${pct}%</span>
        </div>
      </div>
      <div class="store-track"><div class="store-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join(''):'<div style="color:var(--muted);font-size:13px;text-align:center;padding:30px">אין קליקים עדיין</div>';

  // Products
  document.getElementById('prodCount').textContent=`${topProducts.length} מוצרים`;
  document.getElementById('prodBody').innerHTML=topProducts.length?topProducts.map((p,i)=>{
    const link=p.source_url?`<a href="${esc(p.source_url)}" target="_blank">${esc(p.title||'—')}</a>`:esc(p.title||'—');
    const chip=getChip(p.store);
    return `<tr>
      <td class="prod-rank">${i+1}</td>
      <td class="prod-title-cell">
        <span class="prod-title">${link}</span>
        <span class="prod-store-sub"><span class="store-chip ${chip}">${esc(p.store||'—')}</span></span>
      </td>
      <td class="prod-clicks-cell">
        <span class="prod-clicks">${p.clicks}</span>
        <span class="prod-time">${timeAgo(p.last_click)}</span>
      </td>
    </tr>`;
  }).join(''):'<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:30px">אין נתונים</td></tr>';
}

function renderChart(daily){
  const labels=[...daily].reverse().map(d=>d.date.slice(5));
  const data=[...daily].reverse().map(d=>d.sessions);

  if(chartInst){chartInst.destroy();chartInst=null;}
  const ctx=document.getElementById('sessionsChart').getContext('2d');

  const grad=ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,'rgba(167,139,250,0.35)');
  grad.addColorStop(1,'rgba(167,139,250,0.0)');

  chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'כניסות',
        data,
        borderColor:'#a78bfa',
        borderWidth:2.5,
        backgroundColor:grad,
        fill:true,
        tension:0.45,
        pointRadius:data.length<=14?4:2,
        pointBackgroundColor:'#a78bfa',
        pointBorderColor:'#080810',
        pointBorderWidth:2,
        pointHoverRadius:6,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1c1c2e',
          titleColor:'#f0eeff',
          bodyColor:'#a78bfa',
          borderColor:'rgba(255,255,255,0.12)',
          borderWidth:1,
          padding:10,
          titleFont:{family:'Heebo',size:12},
          bodyFont:{family:'Space Mono',size:13,weight:'bold'},
          callbacks:{
            title:items=>items[0].label,
            label:item=>`  ${item.raw} כניסות`
          }
        }
      },
      scales:{
        x:{
          grid:{color:'rgba(255,255,255,0.04)'},
          ticks:{color:'#6b7280',font:{family:'Space Mono',size:10},maxRotation:0,maxTicksLimit:14}
        },
        y:{
          grid:{color:'rgba(255,255,255,0.04)'},
          ticks:{color:'#6b7280',font:{family:'Space Mono',size:10}},
          beginAtZero:true
        }
      }
    }
  });
}

function confirmReset(store){
  pendingResetStore=store;
  document.getElementById('confirmMsg').textContent=store
    ?`איפוס כל הקליקים של חנות ${store}? פעולה זו אינה הפיכה.`
    :'איפוס כל הקליקים מכל החנויות? פעולה זו אינה הפיכה.';
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){
  document.getElementById('confirmOverlay').classList.remove('open');
  pendingResetStore=undefined;
}
async function doReset(){
  const store=pendingResetStore;
  closeConfirm();
  try{
    await fetch('/api/clicks/reset',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify(store?{store}:{})});
    await loadAll();
  }catch(e){alert('שגיאה: '+e.message);}
}

function fmt(n){return Number(n||0).toLocaleString('he-IL');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getChip(s){return{MIMA:'chip-MIMA',MEKIMI:'chip-MEKIMI',LICHI:'chip-LICHI',AVIYAH:'chip-AVIYAH',CHEMISE:'chip-CHEMISE'}[s]||'chip-default';}
function timeAgo(d){
  if(!d)return'—';
  const m=Math.floor((Date.now()-new Date(d))/60000);
  if(m<1)return'עכשיו';if(m<60)return`לפני ${m} דק'`;
  const h=Math.floor(m/60);if(h<24)return`לפני ${h} שע'`;
  return`לפני ${Math.floor(h/24)} ימים`;
}

loadAll();
</script>
</body>
</html>
