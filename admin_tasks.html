<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKLI — משימות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#22223a;--border:#2a2a3a;
  --accent:#c084fc;--accent2:#818cf8;--green:#34d399;--pink:#f472b6;--yellow:#fbbf24;
  --red:#f87171;--text:#f1f0ff;--muted:#6b7280}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 40% at 20% 10%,rgba(192,132,252,0.07) 0%,transparent 60%),
  radial-gradient(ellipse 50% 30% at 80% 80%,rgba(129,140,248,0.05) 0%,transparent 60%);
  pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 20px}
/* Header */
.header{display:flex;align-items:center;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.logo{font-size:22px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0}
.header-nav{display:flex;gap:5px;flex-wrap:wrap;margin-right:auto}
.nav-btn{padding:6px 11px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap}
.nav-btn:hover{color:var(--text);border-color:var(--accent)}
.nav-btn.active{background:rgba(168,85,247,.15);color:var(--accent);border-color:rgba(168,85,247,.3)}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.add-btn:hover{opacity:.85}
.ghost-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.ghost-btn:hover{color:var(--text);border-color:var(--accent)}
.ghost-btn.on{color:var(--accent);border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08)}
.filter-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px}
.filter-tab{padding:5px 11px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-tab.active{background:var(--surface3);color:var(--text);font-weight:600}
.ctrl{padding:7px 11px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .2s}
.ctrl.search{flex:1;min-width:120px}.ctrl.search::placeholder{color:var(--muted)}.ctrl.search:focus{border-color:var(--accent)}
.ctrl.sel{cursor:pointer}
/* Stats */
.stats{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px 13px;display:flex;align-items:center;gap:7px;font-size:13px}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-num{font-weight:700;font-size:15px}.stat-label{color:var(--muted);font-size:11px}
/* Person sections */
.person-section{margin-bottom:22px}
.person-header{display:flex;align-items:center;gap:9px;margin-bottom:9px;cursor:pointer;user-select:none}
.person-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.person-name{font-weight:700;font-size:14px}
.person-count{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:20px}
.person-toggle{margin-right:auto;color:var(--muted);font-size:10px;transition:transform .2s}
.person-toggle.collapsed{transform:rotate(180deg)}
.tasks-list{display:flex;flex-direction:column;gap:6px}
/* Task card */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;position:relative;overflow:hidden;transition:border-color .2s}
.task-card:hover{border-color:rgba(192,132,252,.25)}
.task-card.done{opacity:.5}
.task-card.done .task-title{text-decoration:line-through;color:var(--muted)}
.task-card::before{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;border-radius:0 11px 11px 0}
.task-card.p-high::before{background:var(--red)}.task-card.p-medium::before{background:var(--yellow)}.task-card.p-low::before{background:var(--green)}
.task-main{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;cursor:pointer}
.task-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
.task-check:hover{border-color:var(--accent)}.task-card.done .task-check{background:var(--green);border-color:var(--green)}
.task-check svg{display:none}.task-card.done .task-check svg{display:block}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:4px;word-break:break-word}
.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.task-tag{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600}
.tag-priority-high{background:rgba(248,113,113,.15);color:var(--red)}
.tag-priority-medium{background:rgba(251,191,36,.15);color:var(--yellow)}
.tag-priority-low{background:rgba(52,211,153,.15);color:var(--green)}
.task-due{font-size:11px;color:var(--muted)}.task-due.overdue{color:var(--red)}.task-due.today{color:var(--yellow)}
.task-badges{display:flex;gap:4px;align-items:center;margin-top:5px;flex-wrap:wrap}
.badge-mini{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.badge-mini.lit{color:var(--accent);border-color:rgba(192,132,252,.3)}
.task-pbar{height:2px;background:var(--surface3);margin:0 13px 9px;border-radius:2px;overflow:hidden}
.task-pfill{height:100%;border-radius:2px;transition:width .3s;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.task-actions{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .2s}
.task-card:hover .task-actions{opacity:1}
.task-action-btn{width:25px;height:25px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.task-action-btn:hover{color:var(--text);border-color:var(--accent)}.task-action-btn.del:hover{color:var(--red);border-color:var(--red)}
/* Expand panel */
.task-expand{display:none;border-top:1px solid var(--border);padding:13px}
.task-expand.open{display:block}
.exp-section{margin-bottom:13px}
.exp-label{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
/* Progress slider */
.prow{display:flex;align-items:center;gap:9px}
.pslider{flex:1;-webkit-appearance:none;height:4px;border-radius:4px;outline:none;cursor:pointer}
.pslider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.ppct{font-size:13px;font-weight:700;min-width:34px;text-align:left;color:var(--accent)}
/* Subtasks */
.sub-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)}
.sub-row:last-child{border-bottom:none}
.sub-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sub-cb:hover{border-color:var(--accent)}.sub-cb.chk{background:var(--green);border-color:var(--green)}
.sub-cb svg{display:none}.sub-cb.chk svg{display:block}
.sub-text{flex:1;font-size:13px}.sub-done{text-decoration:line-through;color:var(--muted)}
.sub-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;line-height:1}
.sub-del:hover{color:var(--red)}
.add-sub{display:flex;gap:5px;margin-top:7px}
.add-sub-inp{flex:1;padding:6px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.add-sub-inp:focus{border-color:var(--accent)}.add-sub-inp::placeholder{color:var(--muted)}
.add-sub-btn{padding:6px 11px;background:var(--surface3);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.add-sub-btn:hover{color:var(--text);border-color:var(--accent)}
/* Log */
.log-item{padding:7px 9px;background:var(--surface2);border-radius:7px;margin-bottom:5px;position:relative}
.log-text{font-size:13px;line-height:1.4;padding-left:20px}
.log-ts{font-size:10px;color:var(--muted);margin-top:2px}
.log-del{position:absolute;top:7px;left:7px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0;line-height:1}
.log-del:hover{color:var(--red)}
.add-log{display:flex;gap:5px;margin-top:7px}
.add-log-inp{flex:1;padding:7px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:inherit;outline:none;resize:none}
.add-log-inp:focus{border-color:var(--accent)}.add-log-inp::placeholder{color:var(--muted)}
.add-log-btn{padding:7px 13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;align-self:flex-end}
/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
@media(max-width:650px){.kanban{grid-template-columns:1fr}}
.kb-col{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px}
.kb-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kb-col-title{font-size:13px;font-weight:700}
.kb-col-cnt{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--muted)}
.kb-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden}
.kb-card:hover{border-color:rgba(192,132,252,.3)}
.kb-card::before{content:'';position:absolute;right:0;top:0;bottom:0;width:3px}
.kb-card.p-high::before{background:var(--red)}.kb-card.p-medium::before{background:var(--yellow)}.kb-card.p-low::before{background:var(--green)}
.kb-card-title{font-size:13px;font-weight:500;margin-bottom:5px;line-height:1.3;word-break:break-word}
.kb-card-footer{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.kb-avatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.kb-due{font-size:10px;color:var(--muted)}.kb-due.overdue{color:var(--red)}
.kb-pbar{height:2px;background:var(--surface3);border-radius:2px;margin-bottom:6px;overflow:hidden}
.kb-pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:24px;width:100%;max-width:500px;position:relative;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close{position:absolute;top:14px;left:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;line-height:1}
.modal-close:hover{color:var(--text)}
.field{margin-bottom:11px}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field select{cursor:pointer}.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.msub-item{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)}
.msub-item:last-child{border-bottom:none}
.msub-text{flex:1;font-size:13px}
.msub-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;line-height:1}
.msub-del:hover{color:var(--red)}
.msub-add{display:flex;gap:5px;margin-top:6px}
.msub-inp{flex:1;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.msub-inp:focus{border-color:var(--accent)}.msub-inp::placeholder{color:var(--muted)}
.msub-add-btn{padding:7px 13px;background:var(--surface3);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.msub-add-btn:hover{color:var(--text);border-color:var(--accent)}
.modal-actions{display:flex;gap:7px;margin-top:16px;justify-content:flex-end}
.btn-save{padding:8px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer}
.btn-cancel{padding:8px 15px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
.btn-cancel:hover{color:var(--text);border-color:var(--text)}
/* Empty / Toast */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty svg{opacity:.3;margin-bottom:12px}.empty p{font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);border:1px solid var(--border);border-radius:9px;padding:9px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">LOOKLI</div>
    <div class="header-nav">
      <a href="/admin/analytics" class="nav-btn">📊 אנליטיקס</a>
      <a href="/admin/sponsored" class="nav-btn">🎯 ממומן</a>
      <a href="/admin/ads" class="nav-btn">📋 מודעות</a>
      <a href="/admin/tagger" class="nav-btn">🏷️ טאגר</a>
      <a href="/admin/tasks" class="nav-btn active">✅ משימות</a>
      <a href="/admin/config" class="nav-btn">⚙️ הגדרות</a>
      <a href="/admin/newsletter" class="nav-btn">📧 ניוזלטר</a>
      <a href="/" class="nav-btn" target="_blank">🌐 אתר</a>
    </div>
  </div>

  <div class="toolbar">
    <button class="ghost-btn" onclick="openPersonsModal()">👥 אנשים</button>
    <button class="add-btn" onclick="openModal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      משימה חדשה
    </button>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">הכל</button>
      <button class="filter-tab" onclick="setFilter('open',this)">לעשות</button>
      <button class="filter-tab" onclick="setFilter('inprog',this)">בתהליך</button>
      <button class="filter-tab" onclick="setFilter('done',this)">הושלם</button>
      <button class="filter-tab" onclick="setFilter('overdue',this)">באיחור</button>
    </div>
    <input class="ctrl search" id="searchBox" placeholder="חיפוש..." oninput="render()"/>
    <select class="ctrl sel" id="personFilter" onchange="render()"><option value="">כל האנשים</option></select>
    <select class="ctrl sel" id="sortSel" onchange="render()">
      <option value="created">מיון: חדש</option>
      <option value="priority">מיון: עדיפות</option>
      <option value="due">מיון: תאריך</option>
      <option value="progress">מיון: התקדמות</option>
    </select>
    <button class="ghost-btn" id="viewBtn" onclick="toggleView()">📋 רשימה</button>
  </div>

  <div class="stats" id="statsBar"></div>
  <div id="tasksContainer"></div>
</div>

<!-- Task Modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modalTitle">משימה חדשה</h3>
    <div class="field"><label>כותרת</label><input id="fTitle" placeholder="מה צריך לעשות?" maxlength="200"/></div>
    <div class="field-row">
      <div class="field"><label>אחראי</label><select id="fPerson"></select></div>
      <div class="field"><label>עדיפות</label>
        <select id="fPriority">
          <option value="medium">🟡 בינונית</option>
          <option value="high">🔴 גבוהה</option>
          <option value="low">🟢 נמוכה</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>קטגוריה</label>
        <select id="fCategory">
          <option value="">ללא</option>
          <option value="dev">💻 פיתוח</option>
          <option value="design">🎨 עיצוב</option>
          <option value="content">✍️ תוכן</option>
          <option value="marketing">📣 שיווק</option>
          <option value="ops">⚙️ תפעול</option>
          <option value="other">📌 אחר</option>
        </select>
      </div>
      <div class="field"><label>תאריך יעד</label><input id="fDue" type="date"/></div>
    </div>
    <div class="field"><label>הערות</label><textarea id="fNotes" placeholder="פרטים נוספים..."></textarea></div>
    <div class="field">
      <label>תת-משימות</label>
      <div id="msubList"></div>
      <div class="msub-add">
        <input class="msub-inp" id="msubInp" placeholder="הוסף תת-משימה..." maxlength="120"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addMSub()}"/>
        <button class="msub-add-btn" onclick="addMSub()">+ הוסף</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-save" onclick="saveTask()">שמור</button>
    </div>
  </div>
</div>

<!-- Persons Modal -->
<div class="modal-bg" id="personsModalBg" onclick="if(event.target===this)closePersonsModal()">
  <div class="modal" style="max-width:350px">
    <button class="modal-close" onclick="closePersonsModal()">✕</button>
    <h3>ניהול אנשים</h3>
    <div id="personsList" style="margin-bottom:13px;display:flex;flex-direction:column;gap:5px"></div>
    <div style="display:flex;gap:7px">
      <input id="newPersonInput" placeholder="שם חדש..." maxlength="30"
        style="flex:1;padding:7px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none"
        onkeydown="if(event.key==='Enter')addPerson()"/>
      <button class="btn-save" onclick="addPerson()">הוסף</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK='lookli_tasks_v3', PK='lookli_persons_v1';
const DEFAULT_PERSONS=['נעמי','יועי','שירה','דן'];
const PC=['#c084fc','#f472b6','#34d399','#818cf8','#fbbf24','#f87171','#38bdf8'];
const CAT={dev:'💻 פיתוח',design:'🎨 עיצוב',content:'✍️ תוכן',marketing:'📣 שיווק',ops:'⚙️ תפעול',other:'📌 אחר'};
const PRIO_SORT={high:0,medium:1,low:2};

let tasks=[],persons=[],filter='all',editId=null,viewMode='list',mSubs=[];

function load(){
  try{tasks=JSON.parse(localStorage.getItem(SK))||[];}catch{tasks=[];}
  try{persons=JSON.parse(localStorage.getItem(PK))||DEFAULT_PERSONS;}catch{persons=DEFAULT_PERSONS;}
  tasks.forEach(t=>{
    if(t.progress==null)t.progress=t.done?100:0;
    if(!t.progressLog)t.progressLog=[];
    if(!t.subtasks)t.subtasks=[];
  });
}
function save(){localStorage.setItem(SK,JSON.stringify(tasks));localStorage.setItem(PK,JSON.stringify(persons));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function today(){return new Date().toISOString().slice(0,10);}
function isOver(due){return due&&due<today();}
function isTdy(due){return due&&due===today();}
function inProg(t){return !t.done&&(t.progress>0||(t.subtasks||[]).some(s=>s.done));}
function pColor(n){const i=persons.indexOf(n);return PC[i<0?0:i%PC.length];}
function pInit(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function fmtD(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y.slice(2)}`;}
function fmtTs(ts){const d=new Date(ts);return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setFilter(f,btn){filter=f;document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function getFT(){
  const q=(document.getElementById('searchBox')?.value||'').toLowerCase();
  const p=document.getElementById('personFilter')?.value||'';
  const sort=document.getElementById('sortSel')?.value||'created';
  let list=tasks.filter(t=>{
    if(p&&t.person!==p)return false;
    if(q&&!t.title.toLowerCase().includes(q)&&!(t.notes||'').toLowerCase().includes(q))return false;
    if(filter==='open')return!t.done&&!inProg(t);
    if(filter==='inprog')return inProg(t);
    if(filter==='done')return t.done;
    if(filter==='overdue')return!t.done&&isOver(t.due);
    return true;
  });
  list.sort((a,b)=>{
    if(sort==='priority')return(PRIO_SORT[a.priority]||1)-(PRIO_SORT[b.priority]||1);
    if(sort==='due'){if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due.localeCompare(b.due);}
    if(sort==='progress')return(b.progress||0)-(a.progress||0);
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
  return list;
}

function toggleView(){
  viewMode=viewMode==='list'?'kanban':'list';
  const btn=document.getElementById('viewBtn');
  btn.textContent=viewMode==='list'?'📋 רשימה':'📌 קנבן';
  btn.classList.toggle('on',viewMode==='kanban');
  render();
}

function renderStats(){
  const all=tasks.length,done=tasks.filter(t=>t.done).length;
  const open=tasks.filter(t=>!t.done&&!inProg(t)).length;
  const ip=tasks.filter(t=>inProg(t)).length;
  const over=tasks.filter(t=>!t.done&&isOver(t.due)).length;
  const tdy=tasks.filter(t=>!t.done&&isTdy(t.due)).length;
  document.getElementById('statsBar').innerHTML=
    `<div class="stat"><div class="stat-dot" style="background:var(--accent)"></div><span class="stat-num">${all}</span><span class="stat-label">סה"כ</span></div>`+
    `<div class="stat"><div class="stat-dot" style="background:#60a5fa"></div><span class="stat-num">${open}</span><span class="stat-label">לעשות</span></div>`+
    (ip?`<div class="stat"><div class="stat-dot" style="background:var(--yellow)"></div><span class="stat-num">${ip}</span><span class="stat-label">בתהליך</span></div>`:'')+
    `<div class="stat"><div class="stat-dot" style="background:var(--green)"></div><span class="stat-num">${done}</span><span class="stat-label">הושלמו</span></div>`+
    (over?`<div class="stat"><div class="stat-dot" style="background:var(--red)"></div><span class="stat-num">${over}</span><span class="stat-label">באיחור</span></div>`:'')+
    (tdy?`<div class="stat"><div class="stat-dot" style="background:var(--yellow)"></div><span class="stat-num">${tdy}</span><span class="stat-label">להיום</span></div>`:'');
}

function render(){
  renderStats();fillPersonFilter();
  const ft=getFT(),c=document.getElementById('tasksContainer');
  if(!ft.length){c.innerHTML='<div class="empty"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p>אין משימות</p></div>';return;}
  viewMode==='kanban'?renderKanban(ft):renderList(ft);
}

function renderList(ft){
  const byP={};
  ft.forEach(t=>{const k=t.person||'ללא שיוך';if(!byP[k])byP[k]=[];byP[k].push(t);});
  const keys=[...persons.filter(p=>byP[p]),...Object.keys(byP).filter(k=>!persons.includes(k))];
  document.getElementById('tasksContainer').innerHTML=keys.map(person=>{
    const pts=byP[person],color=pColor(person);
    const open=pts.filter(t=>!t.done).length;
    const slug='s'+btoa(encodeURIComponent(person)).replace(/[^a-z0-9]/gi,'').slice(0,12);
    return`<div class="person-section">
      <div class="person-header" onclick="toggleSec('${slug}')">
        <div class="person-avatar" style="background:${color}22;color:${color}">${pInit(person)}</div>
        <span class="person-name">${esc(person)}</span>
        <span class="person-count">${open} פתוחות / ${pts.length}</span>
        <span class="person-toggle" id="tog-${slug}">▲</span>
      </div>
      <div class="tasks-list" id="${slug}">${pts.map(t=>cardHTML(t)).join('')}</div>
    </div>`;
  }).join('');
}

function toggleSec(id){
  const el=document.getElementById(id),tog=document.getElementById('tog-'+id);
  if(!el)return;
  const h=el.style.display==='none';
  el.style.display=h?'':'none';
  if(tog)tog.classList.toggle('collapsed',!h);
}

function cardHTML(t){
  const pct=t.progress||0,subT=(t.subtasks||[]).length,subD=(t.subtasks||[]).filter(s=>s.done).length,logN=(t.progressLog||[]).length;
  const dueTxt=t.due?(isOver(t.due)&&!t.done?`<span class="task-due overdue">⚠️ ${fmtD(t.due)}</span>`:isTdy(t.due)&&!t.done?`<span class="task-due today">📅 היום</span>`:`<span class="task-due">📅 ${fmtD(t.due)}</span>`):'';
  const catTxt=t.category?`<span class="task-tag" style="background:rgba(192,132,252,.1);color:var(--accent)">${CAT[t.category]||t.category}</span>`:'';
  const prioTxt=`<span class="task-tag tag-priority-${t.priority||'medium'}">${{high:'🔴 גבוהה',medium:'🟡 בינונית',low:'🟢 נמוכה'}[t.priority||'medium']}</span>`;
  const subBadge=subT?`<span class="badge-mini${subD?' lit':''}">☑️ ${subD}/${subT}</span>`:'';
  const pctBadge=pct>0&&pct<100?`<span class="badge-mini lit">⚡ ${pct}%</span>`:'';
  const logBadge=logN?`<span class="badge-mini lit">📝 ${logN}</span>`:'';
  return`<div class="task-card ${t.done?'done':''} p-${t.priority||'medium'}" id="tc-${t.id}">
    <div class="task-main" onclick="toggleExp('${t.id}')">
      <div class="task-check" onclick="event.stopPropagation();toggleDone('${t.id}')">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">${prioTxt}${catTxt}${dueTxt}</div>
        <div class="task-badges">${subBadge}${pctBadge}${logBadge}</div>
      </div>
      <div class="task-actions" onclick="event.stopPropagation()">
        <button class="task-action-btn" onclick="openModal('${t.id}')" title="עריכה">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="task-action-btn del" onclick="deleteTask('${t.id}')" title="מחיקה">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
    ${pct>0?`<div class="task-pbar"><div class="task-pfill" style="width:${pct}%"></div></div>`:''}
    <div class="task-expand" id="exp-${t.id}">${expandHTML(t)}</div>
  </div>`;
}

function expandHTML(t){
  const pct=t.progress||0;
  const subsHTML=(t.subtasks||[]).map(s=>`
    <div class="sub-row">
      <div class="sub-cb${s.done?' chk':''}" onclick="toggleSub('${t.id}','${s.id}')">
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="sub-text${s.done?' sub-done':''}">${esc(s.text)}</span>
      <button class="sub-del" onclick="delSub('${t.id}','${s.id}')">×</button>
    </div>`).join('');
  const logHTML=[...(t.progressLog||[])].reverse().map(e=>`
    <div class="log-item">
      <button class="log-del" onclick="delLog('${t.id}','${e.id}')">×</button>
      <div class="log-text">${esc(e.text)}</div>
      <div class="log-ts">${fmtTs(e.ts)}</div>
    </div>`).join('');
  return`
    <div class="exp-section">
      <div class="exp-label">התקדמות — ${pct}%</div>
      <div class="prow">
        <input type="range" class="pslider" min="0" max="100" value="${pct}"
          style="background:linear-gradient(to left,var(--accent) ${pct}%,var(--surface3) ${pct}%)"
          oninput="updateProg('${t.id}',this.value,this)" onclick="event.stopPropagation()"/>
        <span class="ppct" id="pct-${t.id}">${pct}%</span>
      </div>
    </div>
    <div class="exp-section">
      <div class="exp-label">תת-משימות ${(t.subtasks||[]).length?`(${(t.subtasks||[]).filter(s=>s.done).length}/${(t.subtasks||[]).length})`:''}` </div>
      <div id="subs-${t.id}">${subsHTML}</div>
      <div class="add-sub">
        <input class="add-sub-inp" id="subinp-${t.id}" placeholder="תת-משימה חדשה..." maxlength="120"
          onkeydown="if(event.key==='Enter')addSub('${t.id}')" onclick="event.stopPropagation()"/>
        <button class="add-sub-btn" onclick="event.stopPropagation();addSub('${t.id}')">+ הוסף</button>
      </div>
    </div>
    <div class="exp-section">
      <div class="exp-label">לוג התקדמות ${(t.progressLog||[]).length?`(${(t.progressLog||[]).length})`:''}` </div>
      <div id="log-${t.id}">${logHTML}</div>
      <div class="add-log">
        <textarea class="add-log-inp" id="loginp-${t.id}" placeholder="הוסף עדכון..." rows="2"
          onclick="event.stopPropagation()"></textarea>
        <button class="add-log-btn" onclick="event.stopPropagation();addLog('${t.id}')">➕</button>
      </div>
    </div>`;
}

function renderKanban(ft){
  const cols=[
    {title:'לעשות',color:'#60a5fa',list:ft.filter(t=>!t.done&&!inProg(t))},
    {title:'בתהליך',color:'#fbbf24',list:ft.filter(t=>inProg(t))},
    {title:'הושלם',color:'#34d399',list:ft.filter(t=>t.done)},
  ];
  document.getElementById('tasksContainer').innerHTML=`<div class="kanban">${cols.map(col=>`
    <div class="kb-col">
      <div class="kb-col-hdr"><span class="kb-col-title" style="color:${col.color}">${col.title}</span><span class="kb-col-cnt">${col.list.length}</span></div>
      ${col.list.length?col.list.map(t=>{
        const pct=t.progress||0,color=t.person?pColor(t.person):'#6b7280';
        const due=t.due?(isOver(t.due)&&!t.done?`<span class="kb-due overdue">⚠️ ${fmtD(t.due)}</span>`:`<span class="kb-due">📅 ${fmtD(t.due)}</span>`):'';
        return`<div class="kb-card p-${t.priority||'medium'}" onclick="openModal('${t.id}')">
          ${pct>0?`<div class="kb-pbar"><div class="kb-pfill" style="width:${pct}%"></div></div>`:''}
          <div class="kb-card-title">${esc(t.title)}</div>
          <div class="kb-card-footer">
            ${t.person?`<div class="kb-avatar" style="background:${color}22;color:${color}">${pInit(t.person)}</div>`:''}
            ${due}
            ${(t.subtasks||[]).length?`<span style="font-size:10px;color:var(--muted)">☑️ ${(t.subtasks||[]).filter(s=>s.done).length}/${(t.subtasks||[]).length}</span>`:''}
          </div>
        </div>`;}).join(''):`<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">ריק</div>`}
    </div>`).join('')}</div>`;
}

function toggleExp(id){document.getElementById('exp-'+id)?.classList.toggle('open');}

function updateProg(id,val,sl){
  val=parseInt(val);
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.progress=val;
  if(val===100&&!t.done){t.done=true;t.doneAt=new Date().toISOString();}
  if(val<100&&t.done){t.done=false;t.doneAt=null;}
  const pct=document.getElementById('pct-'+id);if(pct)pct.textContent=val+'%';
  if(pct&&pct.closest('.exp-section'))pct.closest('.exp-section').querySelector('.exp-label').textContent=`התקדמות — ${val}%`;
  sl.style.background=`linear-gradient(to left,var(--accent) ${val}%,var(--surface3) ${val}%)`;
  const card=document.getElementById('tc-'+id);
  if(card){
    let bar=card.querySelector('.task-pfill');
    if(bar)bar.style.width=val+'%';
    else if(val>0){const b=document.createElement('div');b.className='task-pbar';b.innerHTML=`<div class="task-pfill" style="width:${val}%"></div>`;card.insertBefore(b,card.querySelector('.task-expand'));}
    if(val===100)card.classList.add('done');else card.classList.remove('done');
  }
  save();refreshBadges(id);
}

function addSub(tid){
  const inp=document.getElementById('subinp-'+tid);if(!inp)return;
  const text=inp.value.trim();if(!text){inp.focus();return;}
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  t.subtasks.push({id:uid(),text,done:false});
  save();inp.value='';reExp(tid);refreshBadges(tid);
}
function toggleSub(tid,sid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const s=(t.subtasks||[]).find(x=>x.id===sid);if(!s)return;
  s.done=!s.done;
  const tot=t.subtasks.length,dn=t.subtasks.filter(x=>x.done).length;
  if(tot>0)t.progress=Math.round((dn/tot)*100);
  save();reExp(tid);refreshBadges(tid);
}
function delSub(tid,sid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.subtasks=(t.subtasks||[]).filter(s=>s.id!==sid);
  save();reExp(tid);refreshBadges(tid);
}
function addLog(tid){
  const inp=document.getElementById('loginp-'+tid);if(!inp)return;
  const text=inp.value.trim();if(!text){inp.focus();return;}
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  if(!t.progressLog)t.progressLog=[];
  t.progressLog.push({id:uid(),text,ts:new Date().toISOString()});
  save();inp.value='';reExp(tid);refreshBadges(tid);
  showToast('📝 עדכון נשמר');
}
function delLog(tid,eid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.progressLog=(t.progressLog||[]).filter(e=>e.id!==eid);
  save();reExp(tid);refreshBadges(tid);
}
function reExp(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const el=document.getElementById('exp-'+tid);if(!el)return;
  el.innerHTML=expandHTML(t);
}
function refreshBadges(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const el=document.getElementById('tc-'+tid)?.querySelector('.task-badges');if(!el)return;
  const st=(t.subtasks||[]).length,sd=(t.subtasks||[]).filter(s=>s.done).length;
  const ln=(t.progressLog||[]).length,pct=t.progress||0;
  el.innerHTML=(st?`<span class="badge-mini${sd?' lit':''}">☑️ ${sd}/${st}</span>`:'')+
    (pct>0&&pct<100?`<span class="badge-mini lit">⚡ ${pct}%</span>`:'')+
    (ln?`<span class="badge-mini lit">📝 ${ln}</span>`:'');
}

function toggleDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;t.doneAt=t.done?new Date().toISOString():null;
  if(t.done)t.progress=100;
  save();render();showToast(t.done?'✅ משימה הושלמה!':'↩️ נפתחה מחדש');
}
function deleteTask(id){
  if(!confirm('למחוק את המשימה?'))return;
  tasks=tasks.filter(t=>t.id!==id);save();render();showToast('🗑️ נמחקה');
}

function fillPersonSelect(){
  const s=document.getElementById('fPerson');if(!s)return;
  s.innerHTML='<option value="">ללא שיוך</option>'+persons.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
}
function fillPersonFilter(){
  const s=document.getElementById('personFilter');if(!s)return;
  const cur=s.value;
  s.innerHTML='<option value="">כל האנשים</option>'+persons.map(p=>`<option value="${esc(p)}"${p===cur?' selected':''}>${esc(p)}</option>`).join('');
}
function renderMSubs(){
  const c=document.getElementById('msubList');if(!c)return;
  c.innerHTML=mSubs.map(s=>`<div class="msub-item"><span class="msub-text">${esc(s.text)}</span><button class="msub-del" onclick="rmMSub('${s.id}')">×</button></div>`).join('');
}
function addMSub(){
  const inp=document.getElementById('msubInp');const text=inp.value.trim();if(!text){inp.focus();return;}
  mSubs.push({id:uid(),text,done:false});inp.value='';renderMSubs();inp.focus();
}
function rmMSub(id){mSubs=mSubs.filter(s=>s.id!==id);renderMSubs();}

function openModal(id){
  editId=id||null;fillPersonSelect();
  document.getElementById('modalTitle').textContent=id?'עריכת משימה':'משימה חדשה';
  if(id){
    const t=tasks.find(x=>x.id===id);if(!t)return;
    document.getElementById('fTitle').value=t.title||'';
    document.getElementById('fPerson').value=t.person||'';
    document.getElementById('fPriority').value=t.priority||'medium';
    document.getElementById('fCategory').value=t.category||'';
    document.getElementById('fDue').value=t.due||'';
    document.getElementById('fNotes').value=t.notes||'';
    mSubs=JSON.parse(JSON.stringify(t.subtasks||[]));
  }else{
    ['fTitle','fNotes'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('fPerson').value='';
    document.getElementById('fPriority').value='medium';
    document.getElementById('fCategory').value='';
    document.getElementById('fDue').value='';
    mSubs=[];
  }
  renderMSubs();
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');editId=null;mSubs=[];}
function saveTask(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){document.getElementById('fTitle').focus();return;}
  if(editId){
    const t=tasks.find(x=>x.id===editId);
    if(t){t.title=title;t.person=document.getElementById('fPerson').value||'';t.priority=document.getElementById('fPriority').value;t.category=document.getElementById('fCategory').value;t.due=document.getElementById('fDue').value;t.notes=document.getElementById('fNotes').value.trim();t.subtasks=mSubs;t.updatedAt=new Date().toISOString();}
  }else{
    tasks.unshift({id:uid(),title,person:document.getElementById('fPerson').value||'',priority:document.getElementById('fPriority').value,category:document.getElementById('fCategory').value,due:document.getElementById('fDue').value,notes:document.getElementById('fNotes').value.trim(),subtasks:mSubs,progressLog:[],progress:0,done:false,createdAt:new Date().toISOString()});
  }
  save();closeModal();render();showToast(editId?'✏️ עודכנה':'✅ נוספה');
}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closePersonsModal();}
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&document.getElementById('modalBg').classList.contains('open'))saveTask();
});

function openPersonsModal(){renderPersonsList();document.getElementById('personsModalBg').classList.add('open');setTimeout(()=>document.getElementById('newPersonInput').focus(),100);}
function closePersonsModal(){document.getElementById('personsModalBg').classList.remove('open');}
function renderPersonsList(){
  const c=document.getElementById('personsList');
  if(!persons.length){c.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px">אין אנשים</div>';return;}
  c.innerHTML=persons.map((p,i)=>{
    const color=PC[i%PC.length],count=tasks.filter(t=>t.person===p).length;
    return`<div style="display:flex;align-items:center;gap:9px;padding:7px 9px;background:var(--surface2);border-radius:7px;border:1px solid var(--border)">
      <div style="width:24px;height:24px;border-radius:50%;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${pInit(p)}</div>
      <span style="flex:1;font-size:13px">${esc(p)}</span>
      <span style="font-size:11px;color:var(--muted)">${count} משימות</span>
      <button onclick="rmPerson(${JSON.stringify(p)})"
        style="width:22px;height:22px;border-radius:4px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:#f87171;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center">×</button>
    </div>`;}).join('');
}
function addPerson(){
  const inp=document.getElementById('newPersonInput'),name=inp.value.trim();
  if(!name)return inp.focus();
  if(persons.includes(name)){showToast('⚠️ השם קיים');return;}
  persons.push(name);save();inp.value='';renderPersonsList();fillPersonSelect();render();showToast('✅ '+name+' נוסף');
}
function rmPerson(name){
  const count=tasks.filter(t=>t.person===name).length;
  if(!confirm(count?'ל-'+name+' יש '+count+' משימות. להסיר?':'להסיר את '+name+'?'))return;
  persons=persons.filter(p=>p!==name);tasks.forEach(t=>{if(t.person===name)t.person='';});
  save();renderPersonsList();fillPersonSelect();render();showToast('🗑️ '+name+' הוסר');
}

load();render();
</script>
</body>
</html>
