<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LOOKLI — תיוג מוצרים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;
  --surface:#13131e;
  --surface2:#1a1a2a;
  --border:#2a2a3d;
  --accent:#c97cc0;
  --accent2:#7c6fcf;
  --text:#f0eefa;
  --muted:#7a7a9a;
  --green:#4ade80;
  --red:#f87171;
  --yellow:#fbbf24;
  --selected-border:#c97cc0;
  --selected-bg:rgba(201,124,192,0.12);
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}

/* ─── Header ─── */
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.logo{font-size:22px;font-weight:900;letter-spacing:3px;color:var(--accent)}
.header-links{display:flex;gap:8px}
.header-links a{color:var(--muted);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px;transition:.15s}
.header-links a:hover{color:var(--text);background:var(--surface2)}
.header-links a.active{color:var(--accent);background:rgba(201,124,192,.1)}

/* ─── Layout ─── */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 64px)}

/* ─── Sidebar ─── */
.sidebar{
  background:var(--surface);
  border-left:1px solid var(--border);
  padding:24px 20px;
  position:sticky;top:64px;height:calc(100vh - 64px);
  overflow-y:auto;display:flex;flex-direction:column;gap:20px;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}

/* Field selector */
.field-btn{
  width:100%;text-align:right;padding:10px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);font-family:'Heebo',sans-serif;font-size:14px;
  cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px;
}
.field-btn:hover{border-color:var(--accent);color:var(--text)}
.field-btn.active{border-color:var(--accent);background:rgba(201,124,192,.1);color:var(--accent);font-weight:600}
.field-btn .field-icon{font-size:16px;flex-shrink:0}

/* Value input area */
.value-area{display:flex;flex-direction:column;gap:8px}
.value-area label{font-size:12px;color:var(--muted);font-weight:500}
.preset-values{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.preset-val{
  padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface2);color:var(--muted);
  transition:.15s;font-family:'Heebo',sans-serif;
}
.preset-val:hover{border-color:var(--accent2);color:var(--text)}
.preset-val.active{border-color:var(--accent);background:rgba(201,124,192,.15);color:var(--accent);font-weight:600}

.value-input{
  width:100%;padding:10px 14px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;
  outline:none;text-align:right;
}
.value-input:focus{border-color:var(--accent)}

/* Selection info */
.selection-info{
  background:var(--surface2);border-radius:12px;padding:14px;
  border:1px solid var(--border);
}
.sel-count{font-size:28px;font-weight:900;color:var(--accent);line-height:1}
.sel-label{font-size:12px;color:var(--muted);margin-top:2px}
.sel-preview{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;max-height:80px;overflow:hidden}
.sel-chip{
  font-size:11px;padding:2px 8px;border-radius:4px;
  background:rgba(201,124,192,.12);color:var(--accent);
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Apply button */
.apply-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:.2s;letter-spacing:.5px;
}
.apply-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,124,192,.3)}
.apply-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.apply-btn.loading{background:var(--surface2);color:var(--muted)}

.clear-btn{
  width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'Heebo',sans-serif;font-size:13px;
  cursor:pointer;transition:.15s;
}
.clear-btn:hover{border-color:var(--red);color:var(--red)}

/* Toast */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;
  transition:.3s cubic-bezier(.34,1.56,.64,1);z-index:9999;
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#052e16;border:1px solid #16a34a;color:var(--green)}
.toast.error{background:#1c0607;border:1px solid #dc2626;color:var(--red)}

/* ─── Main content ─── */
.main{padding:24px 28px}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  margin-bottom:20px;
}
.search-input{
  flex:1;min-width:200px;padding:10px 16px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;
  outline:none;text-align:right;
}
.search-input:focus{border-color:var(--accent)}
.filter-select{
  padding:10px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);
  font-family:'Heebo',sans-serif;font-size:13px;outline:none;cursor:pointer;
}
.filter-select:focus{border-color:var(--accent)}
.count-badge{
  padding:8px 14px;border-radius:10px;background:var(--surface2);
  font-size:13px;color:var(--muted);white-space:nowrap;border:1px solid var(--border);
}
.select-all-btn{
  padding:9px 16px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'Heebo',sans-serif;font-size:13px;
  cursor:pointer;transition:.15s;white-space:nowrap;
}
.select-all-btn:hover{border-color:var(--accent2);color:var(--accent2)}

/* Grid */
.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

/* Product card */
.prod-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:14px;overflow:hidden;cursor:pointer;
  transition:.15s;position:relative;user-select:none;
}
.prod-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.prod-card.selected{
  border-color:var(--selected-border);
  background:var(--selected-bg);
  box-shadow:0 0 0 1px var(--selected-border), 0 8px 24px rgba(201,124,192,.2);
}
.prod-card.tagged{border-color:rgba(74,222,128,.35)}
.card-check{
  position:absolute;top:8px;right:8px;width:22px;height:22px;
  border-radius:50%;background:var(--surface);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:.15s;z-index:2;
}
.prod-card.selected .card-check{
  background:var(--accent);border-color:var(--accent);color:#fff;
}
.tag-badge{
  position:absolute;top:8px;left:8px;
  padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;
  background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3);
  z-index:2;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.card-img{
  width:100%;aspect-ratio:3/4;object-fit:cover;
  background:var(--surface2);display:block;
}
.card-img-placeholder{
  width:100%;aspect-ratio:3/4;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:32px;
}
.card-body{padding:10px 10px 12px}
.card-title{
  font-size:12px;font-weight:500;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.4;margin-bottom:6px;
}
.card-meta{display:flex;flex-wrap:wrap;gap:4px}
.meta-tag{
  font-size:10px;padding:2px 7px;border-radius:4px;
  background:var(--surface2);color:var(--muted);border:1px solid var(--border);
}
.meta-tag.has-val{color:var(--accent2);border-color:rgba(124,111,207,.4);background:rgba(124,111,207,.08)}
.card-store{font-size:10px;color:var(--muted);margin-top:4px}

/* Empty/loading states */
.state-msg{
  grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--muted);
}
.state-msg .icon{font-size:40px;margin-bottom:12px}
.spinner{
  display:inline-block;width:36px;height:36px;
  border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:24px}
.page-btn{
  padding:8px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);font-family:'Heebo',sans-serif;
  font-size:13px;cursor:pointer;transition:.15s;
}
.page-btn:hover:not(:disabled){border-color:var(--accent2);color:var(--text)}
.page-btn.active{background:rgba(201,124,192,.15);border-color:var(--accent);color:var(--accent);font-weight:700}
.page-btn:disabled{opacity:.35;cursor:not-allowed}
</style>
</head>
<body>

<div class="header">
  <div class="logo">LOOKLI</div>
  <div class="header-links">
    <a href="/admin/analytics">📊 אנליטיקס</a>
    <a href="/admin/sponsored">🎯 ממומן</a>
    <a href="/admin/ads">📋 מודעות</a>
    <a href="/admin/tagger" class="active">🏷️ טאגר</a>
    <a href="/admin/tasks">✅ משימות</a>
    <a href="/admin/config">⚙️ הגדרות</a>
    <a href="/admin/newsletter">📧 ניוזלטר</a>
    <a href="/" target="_blank">🌐 אתר</a>
  </div>
</div>

<div class="layout">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar">

    <div>
      <div class="section-title">שדה לתיוג</div>
      <div id="fieldButtons" style="display:flex;flex-direction:column;gap:6px">
        <button class="field-btn active" data-field="style" onclick="selectField('style',this)">
          <span class="field-icon">✨</span> סגנון
        </button>
        <button class="field-btn" data-field="category" onclick="selectField('category',this)">
          <span class="field-icon">👗</span> קטגוריה
        </button>
        <button class="field-btn" data-field="fit" onclick="selectField('fit',this)">
          <span class="field-icon">📐</span> גיזרה
        </button>
        <button class="field-btn" data-field="fabric" onclick="selectField('fabric',this)">
          <span class="field-icon">🧵</span> סוג בד
        </button>
        <button class="field-btn" data-field="pattern" onclick="selectField('pattern',this)">
          <span class="field-icon">🎨</span> דוגמא
        </button>
        <button class="field-btn" data-field="color" onclick="selectField('color',this)">
          <span class="field-icon">🌈</span> צבע
        </button>
        <button class="field-btn" data-field="design_details" onclick="selectField('design_details',this)">
          <span class="field-icon">✂️</span> עיצוב
        </button>
      </div>
    </div>

    <div class="value-area">
      <div class="section-title">ערך לתיוג</div>
      <div class="preset-values" id="presetValues"></div>
      <input class="value-input" id="valueInput" type="text" placeholder="הכנס ערך חופשי..." oninput="syncValueFromInput()"/>
    </div>

    <div class="selection-info">
      <div class="sel-count" id="selCount">0</div>
      <div class="sel-label">מוצרים נבחרו</div>
      <div class="sel-preview" id="selPreview"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="apply-btn" id="applyBtn" onclick="applyTag()" disabled>
        שמור תיוג
      </button>
      <button class="clear-btn" id="autoDetectBtn" style="border-color:#34d399;color:#34d399" onclick="autoDetectFromDescription()">🔍 זהה אוטומטית מהתיאור (נבחרים)</button>
      <button class="clear-btn" id="autoDetectAllBtn" style="border-color:#0ea5e9;color:#0ea5e9" onclick="autoDetectFromDescription(true)">🔍 זהה אוטומטית — על כל המוצרים המסוננים</button>
      <button class="clear-btn" onclick="clearSelection()">נקה בחירה</button>
      <button class="clear-btn" id="clearFitsBtn" style="display:none;border-color:#f87171;color:#f87171" onclick="clearFits()">נקה גיזרות לנבחרים</button>
      <button class="clear-btn" id="clearStylesBtn" style="display:none;border-color:#f87171;color:#f87171" onclick="clearStyles()">נקה סגנונות לנבחרים</button>
      <button class="clear-btn" id="clearDesignBtn" style="display:none;border-color:#f87171;color:#f87171" onclick="clearDesign()">נקה עיצוב לנבחרים</button>
    </div>

  </aside>

  <!-- ─── Main ─── -->
  <main class="main">
    <div class="toolbar">
      <input class="search-input" id="searchInput" placeholder="חיפוש לפי שם מוצר..." oninput="onSearch()"/>
      <select class="filter-select" id="storeFilter" onchange="onFilter()">
        <option value="">כל החנויות</option>
      </select>
      <select class="filter-select" id="fieldFilter" onchange="onFilter()">
        <option value="">כל המוצרים</option>
        <option value="untagged">ללא תיוג בשדה</option>
        <option value="tagged">עם תיוג בשדה</option>
      </select>
      <span class="count-badge" id="countBadge">0 מוצרים</span>
      <button class="select-all-btn" onclick="selectAllVisible()">בחר עמוד</button>
      <button class="select-all-btn" id="selectAllFilteredBtn" onclick="selectAllFiltered()" style="border-color:#34d399;color:#34d399">בחר את כל המוצרים המסוננים</button>
    </div>

    <div class="products-grid" id="productsGrid">
      <div class="state-msg"><div class="spinner"></div></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───
let allProducts = [];
let filtered = [];
let selected = new Set();
let currentField = 'style';
let currentValue = '';
let page = 1;
const PAGE_SIZE = 60;

// ─── Presets — נטענים דינמית מ-/api/admin/scraper-config ───
const PRESETS = {
  style: [], category: [], fit: [], fabric: [], pattern: [], color: [], design_details: []
};

// fallback למקרה שה-API נכשל
const PRESETS_FALLBACK = {
  style: ['ערב','שבת','חגיגי','יום חול','קלאסי','מינימליסטי','מודרני','רטרו','אוברסייז'],
  category: ['שמלה','חולצה','חצאית','קרדיגן','סוודר','מעיל','בלייזר','טוניקה','סרפן','סט','אוברול','וסט','עליונית','חלוק'],
  fit: ['ארוכה','מידי','קצרה','מותן','מתרחבת','ישרה','מחויטת','מעטפת','צמודה','רפויה','הריון','הנקה'],
  fabric: ["ז'מס",'סריג','שיפון','כותנה','סאטן','תחרה','קטיפה','אריג',"ג'רסי",'פשתן','משי','צמר','עור','פרווה','לייקרה','טריקו','רשת'],
  pattern: ['פסים','פרחוני','משבצות','נקודות','חלק','הדפס','אבסטרקטי','גיאומטרי'],
  color: ['שחור','לבן','שמנת','כחול','תכלת','אדום','בורדו','ירוק','זית','חאקי','חום','קאמל','בז׳','ניוד','אפור','ורוד','סגול','לילך','צהוב','חרדל','כתום','זהב','כסף','פרחוני','צבעוני','מנטה','אפרסק','אבן'],
  design_details: ['צווארון V','צווארון עגול','צווארון גבוה','גולף','צווארון סירה','כפתורים','רוכסן','שרוול ארוך','שרוול קצר','שרוול 3/4','ללא שרוולים','שרוול פעמון','שרוול נפוח','חגורה','קשירה','כיסים','תחרה','פפלום','מלמלה','קפלים','שסע','מעטפת','חשוף כתפיים'],
};

// aliases מלאים מה-config — { type: { name: [alias1, alias2, ...] } } — נדרש לזיהוי אוטומטי מהתיאור
const CONFIG_ALIASES = {};

async function loadPresets() {
  try {
    const r = await fetch('/api/admin/scraper-config', { credentials: 'include' });
    if (!r.ok) throw new Error('config API failed');
    const { items } = await r.json();
    // מפה: type → שמות ממוינים
    const typeMap = { color: [], category: [], style: [], fit: [], fabric: [], pattern: [] };
    items.forEach(item => {
      if (typeMap[item.type] !== undefined) typeMap[item.type].push(item.name);
    });
    Object.keys(typeMap).forEach(t => {
      if (typeMap[t].length > 0) PRESETS[t] = typeMap[t].sort((a, b) => a.localeCompare(b, 'he'));
      else PRESETS[t] = PRESETS_FALLBACK[t] || [];
    });
    // design_details אין בקונפיג — תמיד fallback
    PRESETS.design_details = PRESETS_FALLBACK.design_details;
    // שמור גם את ה-aliases המלאים — נדרש לזיהוי אוטומטי מהתיאור
    items.forEach(item => {
      if (!CONFIG_ALIASES[item.type]) CONFIG_ALIASES[item.type] = {};
      CONFIG_ALIASES[item.type][item.name] = (item.aliases || []).map(a => a.toLowerCase());
    });
  } catch {
    // fallback לכל השדות
    Object.assign(PRESETS, PRESETS_FALLBACK);
  }
}

// ─── Init ───
// auth דרך cookie session (adminAuth)

(async function init() {
  await Promise.all([loadProducts(), loadPresets()]);
  renderPresets();
  renderStoreFilter();
})();

async function loadProducts() {
  try {
    const r = await fetch('/api/products?limit=2000&sort=newest', { credentials: 'include' });
    const data = await r.json();
    allProducts = Array.isArray(data) ? data : (data.results || data.products || []);
    applyFilter();
  } catch(e) {
    showToast('שגיאה בטעינת מוצרים', 'error');
    document.getElementById('productsGrid').innerHTML = '<div class="state-msg"><div class="icon">⚠️</div><div>שגיאה בטעינה</div></div>';
  }
}

function renderStoreFilter() {
  const stores = [...new Set(allProducts.map(p => p.store).filter(Boolean))].sort();
  const sel = document.getElementById('storeFilter');
  stores.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

// ─── Filtering ───
function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const store = document.getElementById('storeFilter').value;
  const fieldF = document.getElementById('fieldFilter').value;

  filtered = allProducts.filter(p => {
    if (q && !p.title?.toLowerCase().includes(q)) return false;
    if (store && p.store !== store) return false;
    const fieldVal = currentField === 'design_details'
      ? (p.design_details && (Array.isArray(p.design_details) ? p.design_details.length > 0 : p.design_details) ? (Array.isArray(p.design_details) ? p.design_details.join(', ') : p.design_details) : null)
      : currentField === 'fit'
        ? (Array.isArray(p.fits) && p.fits.length > 0 ? p.fits.join(', ') : (p.fits || p.fit))
        : currentField === 'style'
          ? (Array.isArray(p.styles) && p.styles.length > 0 ? p.styles.join(', ') : (p.styles || p.style))
          : p[currentField];
    const isUntagged = !fieldVal || fieldVal === 'אחר' || fieldVal === '';
    if (fieldF === 'untagged' && !isUntagged) return false;
    if (fieldF === 'tagged' && isUntagged) return false;
    return true;
  });

  document.getElementById('countBadge').textContent = filtered.length + ' מוצרים';
  page = 1;
  renderGrid();
  renderPagination();
}

function onSearch() { applyFilter(); }
function onFilter() { applyFilter(); }

// ─── Grid render ───
function renderGrid() {
  const grid = document.getElementById('productsGrid');
  const start = (page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  if (!slice.length) {
    grid.innerHTML = '<div class="state-msg"><div class="icon">🔍</div><div>לא נמצאו מוצרים</div></div>';
    return;
  }

  grid.innerHTML = slice.map(p => {
    const isSel = selected.has(p.id);
    const fieldVal = currentField === 'category'
      ? (Array.isArray(p.categories) && p.categories.length ? p.categories.join(' + ') : p.category)
      : currentField === 'fit'
        ? (Array.isArray(p.fits) && p.fits.length > 0 ? p.fits.join(' + ') : p.fit)
        : currentField === 'style'
          ? (Array.isArray(p.styles) && p.styles.length > 0 ? p.styles.join(' + ') : p.style)
          : p[currentField];
    const img = p.image_url || (p.images && p.images[0]) || '';
    const store = p.store || '';
    const price = p.price ? `₪${Math.round(p.price)}` : '';

    return `<div class="prod-card${isSel ? ' selected' : ''}${fieldVal ? ' tagged' : ''}"
      data-id="${p.id}" onclick="toggleCard(${p.id}, this)">
      <div class="card-check">${isSel ? '✓' : ''}</div>
      <button onclick="event.stopPropagation();banProduct(${p.id},this)" title="הסר לתמיד" style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.55);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:10;line-height:1">🗑</button>
      ${fieldVal ? `<div class="tag-badge">${escHtml(fieldVal)}</div>` : ''}
      ${img
        ? `<img class="card-img" src="${escHtml(img)}" loading="lazy" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="card-img-placeholder" style="display:none">👗</div>`
        : `<div class="card-img-placeholder">👗</div>`
      }
      <div class="card-body">
        <div class="card-title"><a href="${escHtml(p.source_url||p.url||'#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none;border-bottom:1px dashed rgba(240,238,250,.25);">${escHtml(p.title || '')}</a></div>
        <div class="card-meta">
          ${price ? `<span class="meta-tag">${price}</span>` : ''}
          ${currentField === 'color' ? (() => {
            const rawColors = Array.isArray(p.colors) && p.colors.length ? p.colors : (p.color ? [p.color] : []);
            const allColors = [...new Set(rawColors.filter(Boolean))];
            if (!allColors.length) return '<span class="meta-tag" style="color:#f87171;border-color:#f8717140">ללא צבע</span>';
            return allColors.map(c => {
              const bg = getColorBg(c);
              const isDark = c === 'שחור' || ['#000000','#0a0a0a','#111111'].includes(bg);
              return `<span class="meta-tag has-val" style="border-color:transparent;background:${bg}20;color:${isDark?'#aaa':bg};display:inline-flex;align-items:center;gap:3px">`
                + `<span style="width:8px;height:8px;border-radius:50%;background:${bg};border:1px solid ${isDark?'#555':'transparent'};display:inline-block"></span> `
                + escHtml(c)
                + `<button data-id="${p.id}" data-color="${escHtml(c)}" onclick="event.stopPropagation();removeColorTag(+this.dataset.id,this.dataset.color)" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:10px;padding:0 0 0 2px" title="הסר">✕</button></span>`;
            }).join('');
          })() : ''}
          ${currentField === 'category' ? (() => {
            const cats = Array.isArray(p.categories) && p.categories.length ? p.categories : (p.category ? [p.category] : []);
            if (!cats.length) return '';
            return cats.map(c => `<span class="meta-tag has-val" style="display:inline-flex;align-items:center;gap:3px">${escHtml(c)}<button data-id="${p.id}" data-field="category" data-val="${escHtml(c)}" onclick="event.stopPropagation();removeFieldTag(+this.dataset.id,this.dataset.field,this.dataset.val)" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:10px;padding:0 0 0 2px" title="הסר">✕</button></span>`).join('');
          })() : ''}
          ${currentField === 'fit' && (p.fits || p.fit) && (Array.isArray(p.fits) ? p.fits.length > 0 : (p.fits || p.fit))
            ? (Array.isArray(p.fits) && p.fits.length > 0 ? p.fits : (p.fit ? [p.fit] : [])).map(f => `<span class="meta-tag has-val" style="background:rgba(124,111,207,.15);border-color:rgba(124,111,207,.5);color:#a89ef7;display:inline-flex;align-items:center;gap:3px">${escHtml(f)}<button data-id="${p.id}" data-field="fit" data-val="${escHtml(f)}" onclick="event.stopPropagation();removeFieldTag(+this.dataset.id,this.dataset.field,this.dataset.val)" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:10px;padding:0 0 0 2px" title="הסר">✕</button></span>`).join('')
            : currentField === 'style' && (p.styles || p.style) && (Array.isArray(p.styles) ? p.styles.length > 0 : (p.styles || p.style))
              ? (Array.isArray(p.styles) && p.styles.length > 0 ? p.styles : (p.style ? [p.style] : [])).map(s => `<span class="meta-tag has-val" style="background:rgba(192,132,252,.15);border-color:rgba(192,132,252,.5);color:#c084fc;display:inline-flex;align-items:center;gap:3px">${escHtml(s)}<button data-id="${p.id}" data-field="style" data-val="${escHtml(s)}" onclick="event.stopPropagation();removeFieldTag(+this.dataset.id,this.dataset.field,this.dataset.val)" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:10px;padding:0 0 0 2px" title="הסר">✕</button></span>`).join('')
              : currentField === 'design_details' && p.design_details && (Array.isArray(p.design_details) ? p.design_details.length > 0 : p.design_details)
                ? (Array.isArray(p.design_details) ? p.design_details : [p.design_details]).map(d => `<span class="meta-tag has-val" style="background:rgba(20,184,166,.12);border-color:rgba(20,184,166,.4);color:#5eead4;display:inline-flex;align-items:center;gap:3px">${escHtml(d)}<button data-id="${p.id}" data-field="design_details" data-val="${escHtml(d)}" onclick="event.stopPropagation();removeFieldTag(+this.dataset.id,this.dataset.field,this.dataset.val)" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:10px;padding:0 0 0 2px" title="הסר">✕</button></span>`).join('')
                : (fieldVal && currentField !== 'color' && currentField !== 'category' ? `<span class="meta-tag has-val" style="display:inline-flex;align-items:center;gap:3px">${escHtml(fieldVal)}<button data-id="${p.id}" data-field="${escHtml(currentField)}" data-val="${escHtml(fieldVal)}" onclick="event.stopPropagation();removeFieldTag(+this.dataset.id,this.dataset.field,this.dataset.val)" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:10px;padding:0 0 0 2px" title="הסר">✕</button></span>` : '')}
        </div>
        <div class="card-store">${escHtml(store)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (total <= 1) { pag.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹ הקודם</button>`;
  const start = Math.max(1, page - 2);
  const end = Math.min(total, page + 2);
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span style="color:var(--muted);padding:0 4px">…</span>':''}`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < total) html += `${end<total-1?'<span style="color:var(--muted);padding:0 4px">…</span>':''}<button class="page-btn" onclick="goPage(${total})">${total}</button>`;
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===total?'disabled':''}>הבא ›</button>`;
  pag.innerHTML = html;
}

function goPage(p) {
  page = p;
  renderGrid();
  renderPagination();
  document.querySelector('.main').scrollTo(0, 0);
  window.scrollTo(0, 0);
}

// ─── Card toggle ───
function toggleCard(id, el) {
  if (selected.has(id)) {
    selected.delete(id);
    el.classList.remove('selected');
    el.querySelector('.card-check').textContent = '';
  } else {
    selected.add(id);
    el.classList.add('selected');
    el.querySelector('.card-check').textContent = '✓';
  }
  updateSelectionUI();
}

function selectAllVisible() {
  const start = (page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const allSel = slice.every(p => selected.has(p.id));
  slice.forEach(p => {
    if (allSel) selected.delete(p.id);
    else selected.add(p.id);
  });
  renderGrid();
  updateSelectionUI();
}

// בחירת כל המוצרים המסוננים (לא רק עמוד נוכחי) — כדי לאפשר החלת תיוג על אלפי מוצרים בבת אחת
function selectAllFiltered() {
  const allSel = filtered.length > 0 && filtered.every(p => selected.has(p.id));
  if (allSel) {
    filtered.forEach(p => selected.delete(p.id));
    showToast('הבחירה בוטלה', 'success');
  } else {
    filtered.forEach(p => selected.add(p.id));
    showToast(`✅ נבחרו ${filtered.length} מוצרים`, 'success');
  }
  renderGrid();
  updateSelectionUI();
}

function clearSelection() {
  selected.clear();
  renderGrid();
  updateSelectionUI();
}

function updateSelectionUI() {
  const count = selected.size;
  document.getElementById('selCount').textContent = count;
  const btn = document.getElementById('applyBtn');
  btn.disabled = count === 0 || !currentValue.trim();

  const allFilteredBtn = document.getElementById('selectAllFilteredBtn');
  if (allFilteredBtn) {
    const allSel = filtered.length > 0 && filtered.every(p => selected.has(p.id));
    allFilteredBtn.textContent = allSel ? `✓ נבחרו כל ${filtered.length} המוצרים` : `בחר את כל המוצרים המסוננים (${filtered.length})`;
  }

  // Preview chips
  const preview = document.getElementById('selPreview');
  const names = [...selected].slice(0, 8).map(id => {
    const p = allProducts.find(x => x.id === id);
    return p ? p.title?.substring(0, 18) || `#${id}` : `#${id}`;
  });
  preview.innerHTML = names.map(n => `<span class="sel-chip">${escHtml(n)}</span>`).join('') +
    (selected.size > 8 ? `<span class="sel-chip">+${selected.size - 8}</span>` : '');
}

// regex לזיהוי עיצוב מהתיאור — מראה מקבילה ל-detectDesignDetails ב-scraper_utils.js
const DESIGN_DETAIL_PATTERNS = [
  [/צווארון\s*וי|v.?neck/i, 'צווארון V'],
  [/צווארון\s*עגול|round.?neck|crew.?neck/i, 'צווארון עגול'],
  [/גולף|turtle.?neck/i, 'גולף'],
  [/סטרפלס|strapless/i, 'סטרפלס'],
  [/כתפיי?ה|off.?shoulder/i, 'חשוף כתפיים'],
  [/שרוול\s*ארוך|long.?sleeve/i, 'שרוול ארוך'],
  [/שרוול\s*קצר|short.?sleeve/i, 'שרוול קצר'],
  [/3\/4|שרוול\s*3/i, 'שרוול 3/4'],
  [/ללא\s*שרוול|sleeveless/i, 'ללא שרוולים'],
  [/שרוול\s*פעמון|bell.?sleeve/i, 'שרוול פעמון'],
  [/שרוול\s*נפוח|puff.?sleeve/i, 'שרוול נפוח'],
  [/כפתור|button/i, 'כפתורים'],
  [/רוכסן|zipper/i, 'רוכסן'],
  [/חגורה|belt/i, 'חגורה'],
  [/קשירה|tie|bow/i, 'קשירה'],
  [/כיס|pocket/i, 'כיסים'],
  [/שסע|slit/i, 'שסע'],
  [/פפלום|peplum/i, 'פפלום'],
  [/שכבות|layer/i, 'שכבות'],
];

// ─── זיהוי אוטומטי מהתיאור — מוצא את כל ההתאמות (לא רק הראשונה) ומחיל את כולן ───
async function autoDetectFromDescription(useAllFiltered) {
  const field = currentField;
  if (!['style','fit','fabric','pattern','design_details','category','color'].includes(field)) return;

  const ids = useAllFiltered ? filtered.map(p => p.id) : [...selected];
  if (ids.length === 0) {
    showToast(useAllFiltered ? 'אין מוצרים מסוננים' : 'לא נבחרו מוצרים', 'error');
    return;
  }

  if (useAllFiltered && ids.length > 50) {
    if (!confirm(`לזהות ולתייג אוטומטית על ${ids.length} מוצרים? פעולה זו עלולה לקחת זמן.`)) return;
  }

  const btn = document.getElementById(useAllFiltered ? 'autoDetectAllBtn' : 'autoDetectBtn');
  const origText = btn.textContent;
  btn.textContent = 'מזהה...'; btn.disabled = true;

  try {
    const aliasMap = CONFIG_ALIASES[field] || {};

    // לכל מוצר נבחר — מצא את כל הערכים שמתאימים (כותרת + תיאור)
    // value → Set of product ids that should get this value
    const valueToIds = {};
    let matchedProductsCount = 0, multiMatchCount = 0;

    for (const id of ids) {
      const p = allProducts.find(x => x.id === id);
      if (!p) continue;
      const text = ((p.title || '') + ' ' + (p.description || '')).toLowerCase();
      const foundValues = [];
      if (field === 'design_details') {
        // עיצוב — regex matching, לא config aliases
        for (const [pattern, name] of DESIGN_DETAIL_PATTERNS) {
          if (pattern.test(text)) foundValues.push(name);
        }
      } else {
        for (const [name, aliases] of Object.entries(aliasMap)) {
          if (aliases.some(a => a && text.includes(a))) foundValues.push(name);
        }
      }
      if (foundValues.length === 0) continue;
      matchedProductsCount++;
      if (foundValues.length > 1) multiMatchCount++;
      foundValues.forEach(v => {
        if (!valueToIds[v]) valueToIds[v] = [];
        valueToIds[v].push(id);
      });
    }

    if (Object.keys(valueToIds).length === 0) {
      showToast('לא נמצאו התאמות בתיאור/כותרת', 'error');
      return;
    }

    // הפעל את ה-endpoint הקיים פעם אחת לכל ערך שנמצא (ה-API כבר תומך בהוספה ל-array בלי דריסה)
    for (const [value, valueIds] of Object.entries(valueToIds)) {
      const r = await fetch('/api/admin/tag-products', {
        method: 'PATCH',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids: valueIds, field, value })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'שגיאה');

      // עדכן local state — בדיוק כמו ב-applyTag
      valueIds.forEach(id => {
        const p = allProducts.find(x => x.id === id);
        if (!p) return;
        if (field === 'fit') {
          const existing = Array.isArray(p.fits) ? p.fits : (p.fits ? [p.fits] : (p.fit ? [p.fit] : []));
          p.fit = value;
          p.fits = [...new Set([...existing, value])];
        } else if (field === 'style') {
          const existing = Array.isArray(p.styles) ? p.styles : (p.styles ? [p.styles] : (p.style ? [p.style] : []));
          p.style = value;
          p.styles = [...new Set([...existing, value])];
        } else if (field === 'color') {
          const existing = Array.isArray(p.colors) ? p.colors : (p.color ? [p.color] : []);
          p.color = value;
          p.colors = [...new Set([...existing, value])];
        } else if (field === 'design_details') {
          const dd = Array.isArray(p.design_details) ? p.design_details : (p.design_details ? [p.design_details] : []);
          p.design_details = [...new Set([...dd, value])];
        } else {
          p[field] = value;
        }
      });
    }

    showToast(`✅ זוהו ועודכנו ${matchedProductsCount} מוצרים (${multiMatchCount} מהם עם 2+ ערכים)`, 'success');
    applyFilter();
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  } finally {
    btn.textContent = origText; btn.disabled = false;
  }
}

function syncValueFromInput() {

  });

}

function updateApplyBtn() {

}

// ─── Apply tag ───
async function applyTag() {
  if (selected.size === 0 || !currentValue.trim()) return;
  const btn = document.getElementById('applyBtn');
  btn.classList.add('loading');
  btn.textContent = 'שומר...';
  btn.disabled = true;

  try {
    const ids = [...selected];
    const replaceOther = currentField === 'color' && ids.some(id => {
      const p = allProducts.find(x => x.id === id);
      return Array.isArray(p?.colors) ? p.colors.includes('אחר') : p?.color === 'אחר';
    });
    const r = await fetch('/api/admin/tag-products', {
      method: 'PATCH',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids, field: currentField, value: currentValue.trim(), replaceOther })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'שגיאה');

    // עדכן local state — רק למוצרים שבאמת עודכנו (לא דולגו)
    const skippedSet = new Set(data.skippedIds || []);
    const updatedIds = ids.filter(id => !skippedSet.has(id));
    updatedIds.forEach(id => {
      const p = allProducts.find(x => x.id === id);
      if (!p) return;
      if (currentField === 'color') {
        const existingColors = Array.isArray(p.colors) ? p.colors : (p.color ? [p.color] : []);
        // החלף "אחר" אם קיים, אחרת הוסף
        const hasOther = existingColors.includes('אחר');
        const newColors = hasOther
          ? [...new Set(existingColors.map(c => c === 'אחר' ? currentValue.trim() : c))]
          : [...new Set([...existingColors, currentValue.trim()])];
        p.color = newColors[0];
        p.colors = newColors;
      } else if (currentField === 'fit') {
        const existingFits = Array.isArray(p.fits) ? p.fits
          : (p.fits ? [p.fits] : (p.fit ? [p.fit] : []));
        p.fit = currentValue.trim();
        p.fits = [...new Set([...existingFits, currentValue.trim()])];
      } else if (currentField === 'style') {
        const existingStyles = Array.isArray(p.styles) ? p.styles
          : (p.styles ? [p.styles] : (p.style ? [p.style] : []));
        p.style = currentValue.trim();
        p.styles = [...new Set([...existingStyles, currentValue.trim()])];
      } else if (currentField === 'design_details') {
        const dd = Array.isArray(p.design_details) ? p.design_details : (p.design_details ? [p.design_details] : []);
        p.design_details = [...new Set([...dd, currentValue.trim()])];
      } else {
        p[currentField] = currentValue.trim();
      }
    });

    const skipMsg = data.skipped > 0 ? ` (${data.skipped} דולגו)` : '';
    showToast(`✅ עודכנו ${updatedIds.length} מוצרים${skipMsg} → ${currentField}: "${currentValue}"`, 'success');
    clearSelection();
    applyFilter();
  } catch(e) {
    showToast('❌ שגיאה: ' + e.message, 'error');
  } finally {
    btn.classList.remove('loading');
    btn.textContent = 'שמור תיוג';
    updateApplyBtn();
  }
}

function getColorBg(c) { return COLOR_HEX[c] || '#888'; }
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

async function banProduct(id, btn) {
  if (!confirm('להסיר מוצר זה לתמיד? הוא לא יופיע יותר באתר.')) return;
  btn.textContent = '⏳';
  try {
    const r = await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
    const data = await r.json();
    if (data.ok) {
      const card = btn.closest('.card');
      if (card) { card.style.opacity = '0'; card.style.transition = 'opacity .3s'; setTimeout(() => card.remove(), 300); }
      showToast('✅ מוצר הוסר לתמיד');
    } else {
      btn.textContent = '🗑';
      showToast('❌ שגיאה: ' + (data.error || ''), 'error');
    }
  } catch(e) {
    btn.textContent = '🗑';
    showToast('❌ ' + e.message, 'error');
  }
}

async function removeFieldTag(id, field, value) {
  const r = await fetch('/api/admin/tag-products/remove-value', {
    method: 'PATCH', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, field, value })
  });
  if (r.ok) {
    const p = allProducts.find(x => x.id === id);
    if (p) {
      if (field === 'fit') {
        p.fits = (p.fits || []).filter(v => v !== value);
        if (p.fit === value) p.fit = p.fits[0] || null;
      } else if (field === 'style') {
        p.styles = (p.styles || []).filter(v => v !== value);
        if (p.style === value) p.style = p.styles[0] || null;
      } else if (field === 'design_details') {
        p.design_details = (Array.isArray(p.design_details) ? p.design_details : [p.design_details]).filter(v => v !== value);
      } else {
        p[field] = null;
      }
    }
    showToast('הוסר: ' + value, 'success');
    applyFilter();
  } else showToast('שגיאה', 'error');
}

async function removeColorTag(id, color) {
  const r = await fetch('/api/admin/tag-products/remove-value', {
    method: 'PATCH', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, field: 'color', value: color })
  });
  if (r.ok) {
    const p = allProducts.find(x => x.id === id);
    if (p) {
      p.colors = (p.colors || []).filter(c => c !== color);
      if (p.color === color) p.color = p.colors[0] || null;
    }
    showToast('הוסר צבע: ' + color, 'success');
    applyFilter();
  } else showToast('שגיאה', 'error');
}
