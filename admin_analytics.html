<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKLI — דוח נתונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;--accent:#c084fc;--accent2:#818cf8;--green:#34d399;--pink:#f472b6;--yellow:#fbbf24;--text:#f1f0ff;--muted:#6b7280}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(192,132,252,.08) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 80% 80%,rgba(129,140,248,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:32px 24px}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:12px}
  .logo{font-size:24px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .period-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer;outline:none}
  .btn{padding:8px 16px;border:none;border-radius:10px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;transition:opacity .2s}
  .btn:hover{opacity:.85}
  .btn-refresh{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-price{background:#c48cb3;color:#fff}
  .btn-size{background:#7c6fcf;color:#fff}
  .badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s}
  .kpi-card:hover{transform:translateY(-2px);border-color:var(--accent)}
  .kpi-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;filter:blur(30px);opacity:.3}
  .kpi-card:nth-child(1)::before{background:var(--accent)}
  .kpi-card:nth-child(2)::before{background:var(--green)}
  .kpi-card:nth-child(3)::before{background:var(--pink)}
  .kpi-card:nth-child(4)::before{background:var(--accent2)}
  .kpi-card:nth-child(5)::before{background:var(--yellow)}
  .kpi-card:nth-child(6)::before{background:var(--green)}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .kpi-value{font-size:30px;font-weight:900;line-height:1}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px}
  .card-title{font-size:15px;font-weight:700;margin-bottom:20px}
  .chart-wrap{height:150px;display:flex;align-items:flex-end;gap:3px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
  .bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent2));min-height:4px;cursor:pointer}
  .bar:hover{opacity:.8}
  .bar-label{font-size:9px;color:var(--muted);white-space:nowrap}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  @media(max-width:800px){.two-col{grid-template-columns:1fr}}
  .table-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px}
  .store-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:12px}
  .store-row:last-child{border-bottom:none}
  .store-name{font-weight:700;min-width:80px;font-size:13px}
  .store-bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .store-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s cubic-bezier(.34,1.56,.64,1)}
  .store-count{font-size:12px;font-weight:700;min-width:65px;text-align:left}
  .store-pct{font-size:11px;color:var(--muted);min-width:32px;text-align:left}
  .product-list{display:flex;flex-direction:column;gap:7px}
  .product-row{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:10px;transition:border-color .2s}
  .product-row:hover{border-color:var(--accent)}
  .product-rank{font-size:14px;font-weight:900;color:var(--border);min-width:24px}
  .product-info{flex:1;overflow:hidden}
  .product-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .product-store{font-size:10px;color:var(--muted);margin-top:2px}
  .product-clicks{font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .db-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:22px}
  .db-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
  .db-value{font-size:22px;font-weight:900;color:var(--green)}
  .db-label{font-size:10px;color:var(--muted);margin-top:3px}
  .show-more{display:block;width:100%;margin-top:10px;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-family:'Heebo',sans-serif;font-size:12px;cursor:pointer;transition:border-color .2s,color .2s;text-align:center}
  .show-more:hover{border-color:var(--accent);color:var(--accent)}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:16px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-msg{background:rgba(244,114,182,.1);border:1px solid var(--pink);border-radius:12px;padding:20px;color:var(--pink);text-align:center;margin:20px 0}
  .footer{text-align:center;color:var(--muted);font-size:12px;padding:20px 0}
  .footer strong{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">LOOKLI Analytics</div>
    <div class="header-actions">
      <select class="period-select" id="periodSelect" onchange="loadData()">
        <option value="7">7 ימים</option>
        <option value="28" selected>28 ימים</option>
        <option value="90">90 ימים</option>
      </select>
      <button class="btn btn-refresh" onclick="loadData()">🔄 רענן</button>
      <button class="btn btn-price" onclick="testAlert('price')">🧪 בדיקת מחיר</button>
      <button class="btn btn-size" onclick="testAlert('size')">🧪 בדיקת מידה</button>
      <span class="badge">GA4</span>
    </div>
  </div>

  <div id="dbStats"></div>
  <div id="content"><div class="loading"><div class="spinner"></div><div>טוען נתונים...</div></div></div>
  <div class="footer">נתונים מאומתים על ידי <strong>Google Analytics</strong> · מופעל ע"י LOOKLI</div>
</div>

<script>
function authFetch(url,options={}){return fetch(url,{...options,credentials:'include'})}

async function loadDbStats(){
  try{
    const r=await authFetch('/api/clicks/stats');
    if(!r.ok) return;
    const d=await r.json();
    document.getElementById('dbStats').innerHTML=`<div class="db-grid">
      <div class="db-card"><div class="db-value">${fmt(d.total)}</div><div class="db-label">סה"כ קליקים (DB)</div></div>
      ${(d.byStore||[]).slice(0,5).map(s=>`<div class="db-card"><div class="db-value" style="color:var(--accent)">${fmt(s.count)}</div><div class="db-label">${s.store}</div></div>`).join('')}
    </div>`;
  }catch(e){}
}

async function loadData(){
  const days=document.getElementById('periodSelect').value;
  document.getElementById('content').innerHTML=`<div class="loading"><div class="spinner"></div><div>טוען נתונים...</div></div>`;
  try{
    const res=await authFetch(`/api/analytics?days=${days}`);
    if(res.status===401){
      document.getElementById('content').innerHTML=`<div class="error-msg">נדרשת התחברות — <a href="/admin/analytics" style="color:var(--accent)">התחבר</a></div>`;
      return;
    }
    if(!res.ok) throw new Error(await res.text());
    render(await res.json(),days);
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="error-msg">שגיאה: ${e.message}</div>`;
  }
}

function render(data,days){
  const{totals,daily,stores,topProducts}=data;
  const ctr=totals.sessions>0?((totals.outboundClicks/totals.sessions)*100).toFixed(1):0;
  const pps=totals.sessions>0?(totals.pageViews/totals.sessions).toFixed(1):0;

  const storesHtml=stores.length===0
    ?'<div style="color:var(--muted);text-align:center;padding:20px">אין נתוני קליקים עדיין</div>'
    :stores.map((s,i)=>{
        const pct=totals.outboundClicks>0?Math.round(s.clicks/totals.outboundClicks*100):0;
        return `<div class="store-row" ${i>=6?'style="display:none"':''} data-store-row>
          <div class="store-name">${s.name}</div>
          <div class="store-bar-wrap"><div class="store-bar-fill" style="width:${pct}%"></div></div>
          <div class="store-count">${fmt(s.clicks)} קליקים</div>
          <div class="store-pct">${pct}%</div>
        </div>`;
      }).join('');
  const storesMore=stores.length>6?`<button class="show-more" onclick="toggleRows(this,'[data-store-row]',6)">הצג עוד ${stores.length-6} ▼</button>`:'';

  const prodsHtml=topProducts.length===0
    ?'<div style="color:var(--muted);text-align:center;padding:20px">אין נתונים עדיין</div>'
    :`<div class="product-list">${topProducts.map((p,i)=>`
        <div class="product-row" ${i>=8?'style="display:none"':''} data-product-row>
          <div class="product-rank">#${i+1}</div>
          <div class="product-info"><div class="product-title">${esc(p.title)}</div><div class="product-store">${esc(p.store)}</div></div>
          <div class="product-clicks">${p.clicks}</div>
        </div>`).join('')}
      </div>
      ${topProducts.length>8?`<button class="show-more" onclick="toggleRows(this,'[data-product-row]',8)">הצג עוד ${topProducts.length-8} ▼</button>`:''}`;

  document.getElementById('content').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">כניסות לאתר</div><div class="kpi-value" style="color:var(--accent)">${fmt(totals.sessions)}</div><div class="kpi-sub">ב-${days} ימים</div></div>
      <div class="kpi-card"><div class="kpi-label">משתמשים ייחודיים</div><div class="kpi-value" style="color:var(--green)">${fmt(totals.users)}</div><div class="kpi-sub">גולשים שונים</div></div>
      <div class="kpi-card"><div class="kpi-label">קליקים לחנויות</div><div class="kpi-value" style="color:var(--pink)">${fmt(totals.outboundClicks)}</div><div class="kpi-sub">יציאות לרכישה</div></div>
      <div class="kpi-card"><div class="kpi-label">צפיות בעמוד</div><div class="kpi-value" style="color:var(--accent2)">${fmt(totals.pageViews)}</div><div class="kpi-sub">סה"כ צפיות</div></div>
      <div class="kpi-card"><div class="kpi-label">שיעור קליק לחנות</div><div class="kpi-value" style="color:var(--yellow)">${ctr}%</div><div class="kpi-sub">קליקים / כניסות</div></div>
      <div class="kpi-card"><div class="kpi-label">עמודים לסשן</div><div class="kpi-value" style="color:var(--green)">${pps}</div><div class="kpi-sub">ממוצע</div></div>
    </div>
    <div class="chart-card"><div class="card-title">כניסות יומיות לאתר</div><div class="chart-wrap" id="chartWrap"></div></div>
    <div class="two-col">
      <div class="table-card"><div class="card-title">קליקים לפי חנות</div>${storesHtml}${storesMore}</div>
      <div class="table-card"><div class="card-title">מוצרים מובילים</div>${prodsHtml}</div>
    </div>`;

  if(daily&&daily.length>0){
    const max=Math.max(...daily.map(d=>d.sessions),1);
    document.getElementById('chartWrap').innerHTML=daily.map(d=>`
      <div class="bar-col">
        <div class="bar" style="height:${Math.max(4,Math.round(d.sessions/max*140))}px" title="${d.date}: ${d.sessions}"></div>
        <div class="bar-label">${d.date.substring(5)}</div>
      </div>`).join('');
  }
}

function toggleRows(btn,selector,limit){
  const rows=document.querySelectorAll(selector);
  const hidden=[...rows].filter(r=>r.style.display==='none');
  if(hidden.length>0){hidden.forEach(r=>r.style.display='');btn.textContent='הסתר ▲';}
  else{rows.forEach((r,i)=>{if(i>=limit)r.style.display='none';});btn.textContent=btn.textContent.replace('הסתר ▲',`הצג עוד ▼`);}
}

function fmt(n){if(!n)return'0';return Number(n).toLocaleString('he-IL')}
function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function testAlert(type){
  const r=await authFetch('/api/admin/test-alert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type})});
  const d=await r.json();
  if(d.ok)alert('✅ מייל '+(type==='price'?'מחיר':'מידה')+' נשלח ל: '+d.sent_to+'\nמוצר: '+d.product);
  else alert('❌ '+(d.msg||JSON.stringify(d.error)||'שגיאה'));
}

loadDbStats();
loadData();
</script>
</body>
</html>
