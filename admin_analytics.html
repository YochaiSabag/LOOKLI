<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKLI — אנליטיקס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --surface3:#22223a;
  --border:#2a2a3a; --border2:#3a3a50;
  --accent:#c084fc; --accent2:#818cf8;
  --green:#34d399; --pink:#f472b6; --yellow:#fbbf24; --red:#f87171;
  --text:#f1f0ff; --muted:#6b7280; --muted2:#4b5563;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 5%,rgba(192,132,252,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 85% 85%,rgba(129,140,248,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:32px 20px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.logo{font-size:24px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nav a{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.nav a:hover{color:var(--text);border-color:var(--border)}
.nav a.active{background:rgba(192,132,252,.12);color:var(--accent);border-color:rgba(192,132,252,.25)}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.period-sel{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:9px;font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer;outline:none}
.period-sel:focus{border-color:var(--accent)}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.25);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.refresh-btn{padding:7px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;transition:all .2s}
.refresh-btn:hover{color:var(--text);border-color:var(--accent)}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-glow{position:absolute;top:-10px;right:-10px;width:70px;height:70px;border-radius:50%;filter:blur(28px);opacity:.25}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600}
.kpi-value{font-size:32px;font-weight:900;line-height:1;letter-spacing:-1px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}

/* Device row */
.device-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.device-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.device-card:hover{border-color:var(--border2)}
.device-icon{font-size:26px;line-height:1}
.device-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.device-val{font-size:22px;font-weight:900}
.device-pct{font-size:11px;color:var(--muted);margin-top:2px}

/* Chart */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:18px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:700}
.card-legend{display:flex;gap:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%}

.chart-wrap{height:160px;display:flex;align-items:flex-end;gap:3px;overflow:hidden}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
.bar-stack{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:1px;height:148px}
.bar-seg{width:100%;border-radius:3px 3px 0 0;min-height:3px;cursor:pointer;transition:opacity .2s}
.bar-seg:hover{opacity:.75}
.bar-seg.sessions{background:linear-gradient(180deg,var(--accent),var(--accent2))}
.bar-seg.clicks{background:linear-gradient(180deg,var(--green),#059669)}
.bar-label{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}

/* Stores */
.stores-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.stores-grid{grid-template-columns:1fr}}
.store-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.store-row:last-child{border-bottom:none}
.store-name{font-weight:700;font-size:13px;min-width:90px}
.store-bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.store-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s cubic-bezier(.34,1.56,.64,1)}
.store-count{font-size:13px;font-weight:700;min-width:50px;text-align:left;white-space:nowrap}
.store-pct{font-size:11px;color:var(--muted);min-width:35px;text-align:left}
.store-src{font-size:9px;color:var(--muted2);min-width:28px;text-align:left}

/* Products list */
.products-list{}
.prod-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;text-decoration:none;color:inherit}
.prod-row:last-child{border-bottom:none}
.prod-row:hover{background:rgba(192,132,252,.04);border-radius:8px;padding-left:6px;margin-left:-6px}
.prod-rank{font-size:12px;font-weight:900;color:var(--muted);min-width:22px;text-align:right}
.prod-img{width:36px;height:36px;border-radius:7px;object-fit:cover;background:var(--surface3);flex-shrink:0}
.prod-img-placeholder{width:36px;height:36px;border-radius:7px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.prod-info{flex:1;min-width:0}
.prod-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.prod-store{font-size:10px;color:var(--muted);margin-top:1px}
.prod-clicks{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;min-width:36px;text-align:left}
.prod-bar{flex:1;max-width:80px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prod-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* Two-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}

/* Loading / Error */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 0;gap:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:12px;padding:20px;color:var(--red);text-align:center;margin:20px 0}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{padding:8px 16px;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}

.show-more-btn{width:100%;padding:10px;background:none;border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:12px;font-family:'Heebo',sans-serif;cursor:pointer;margin-top:10px;transition:all .2s}
.show-more-btn:hover{color:var(--text);border-color:var(--accent)}

.footer{text-align:center;color:var(--muted);font-size:11px;padding:20px 0;margin-top:8px}
.footer strong{color:var(--accent)}

.stat-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.stat-chip.up{background:rgba(52,211,153,.1);color:var(--green)}
.stat-chip.down{background:rgba(248,113,113,.1);color:var(--red)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">LOOKLI</div>
    <nav class="nav">
      <a href="/admin/analytics" class="active">📊 אנליטיקס</a>
      <a href="/admin/sponsored">🎯 ממומן</a>
      <a href="/admin/ads">📋 מודעות</a>
      <a href="/admin/tagger">🏷️ טאגר</a>
      <a href="/admin/tasks">✅ משימות</a>
      <a href="/admin/config">⚙️ הגדרות</a>
      <a href="/admin/newsletter">📧 ניוזלטר</a>
      <a href="/" target="_blank">🌐 אתר</a>
    </nav>
  </div>

  <div class="toolbar">
    <select class="period-sel" id="periodSel" onchange="onPeriodChange()">
      <option value="7">7 ימים</option>
      <option value="28" selected>28 ימים</option>
      <option value="90">90 ימים</option>
      <option value="custom">מתאריך מסוים…</option>
    </select>
    <input type="date" id="sinceInput" style="display:none" onchange="onSinceChange()"/>
    <button class="refresh-btn" onclick="setSinceToday()" title="הצג נתונים רק החל מהיום">מהיום והלאה</button>
    <span class="badge">● GA4 + DB</span>
    <button class="refresh-btn" onclick="loadData()">↻ רענן</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><div>טוען נתונים...</div></div>
  </div>

  <div class="footer">נתונים מ-<strong>Google Analytics 4</strong> + מסד הנתונים הפנימי</div>
</div>

<script>
let _data = null;
let prodLimit = 20;

// ── טווח תאריכים: או "days" רגיל, או "since" (תאריך התחלה מפורש) — נשמר כברירת מחדל ──
function getSince() { return localStorage.getItem('analytics_since') || ''; }
function setSince(dateStr) {
  if (dateStr) localStorage.setItem('analytics_since', dateStr);
  else localStorage.removeItem('analytics_since');
}
function setSinceToday() {
  const today = new Date().toISOString().slice(0,10);
  setSince(today);
  document.getElementById('periodSel').value = 'custom';
  document.getElementById('sinceInput').style.display = 'inline-block';
  document.getElementById('sinceInput').value = today;
  loadData();
}
function onPeriodChange() {
  const val = document.getElementById('periodSel').value;
  if (val === 'custom') {
    document.getElementById('sinceInput').style.display = 'inline-block';
    if (!getSince()) { document.getElementById('sinceInput').value = new Date().toISOString().slice(0,10); }
  } else {
    document.getElementById('sinceInput').style.display = 'none';
    setSince(null);
  }
  loadData();
}
function onSinceChange() {
  setSince(document.getElementById('sinceInput').value);
  loadData();
}

async function loadData() {
  const since = getSince();
  const days = document.getElementById('periodSel').value;
  prodLimit = 20;
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div><div>טוען נתונים...</div></div>`;
  try {
    const url = since ? `/api/analytics?since=${since}` : `/api/analytics?days=${days}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(await res.text());
    _data = await res.json();
    render(_data, since ? `מתאריך ${since}` : `ב-${days} ימים אחרונים`);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">שגיאה: ${esc(e.message)}<br><small>ודא שה-Service Account מחובר ל-GA4</small></div>`;
  }
}

function render(data, periodLabel) {
  const { totals, daily, stores, topProducts, devices } = data;
  const totalDev = Object.values(devices||{}).reduce((a,b)=>a+b,0) || 1;
  const mobile  = devices?.mobile  || 0;
  const desktop = devices?.desktop || 0;
  const tablet  = devices?.tablet  || 0;
  const avgMin  = totals.avgDuration ? Math.floor(totals.avgDuration/60)+'m '+Math.floor(totals.avgDuration%60)+'s' : '—';
  const bounceP = totals.bounceRate ? Math.round(totals.bounceRate*100)+'%' : '—';

  document.getElementById('content').innerHTML = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-glow" style="background:var(--accent)"></div>
        <div class="kpi-label">כניסות לאתר</div>
        <div class="kpi-value" style="color:var(--accent)">${fmt(totals.sessions)}</div>
        <div class="kpi-sub">${periodLabel}</div>
      </div>
      <div class="kpi">
        <div class="kpi-glow" style="background:var(--green)"></div>
        <div class="kpi-label">משתמשים ייחודיים</div>
        <div class="kpi-value" style="color:var(--green)">${fmt(totals.users)}</div>
        <div class="kpi-sub">גולשים שונים</div>
      </div>
      <div class="kpi">
        <div class="kpi-glow" style="background:var(--pink)"></div>
        <div class="kpi-label">קליקים לחנויות</div>
        <div class="kpi-value" style="color:var(--pink)">${fmt(totals.outboundClicks || stores.reduce((a,s)=>a+s.clicks,0))}</div>
        <div class="kpi-sub">יציאות לרכישה</div>
      </div>
      <div class="kpi">
        <div class="kpi-glow" style="background:var(--accent2)"></div>
        <div class="kpi-label">צפיות בעמוד</div>
        <div class="kpi-value" style="color:var(--accent2)">${fmt(totals.pageViews)}</div>
        <div class="kpi-sub">סה"כ צפיות</div>
      </div>
      <div class="kpi">
        <div class="kpi-glow" style="background:var(--yellow)"></div>
        <div class="kpi-label">זמן ממוצע</div>
        <div class="kpi-value" style="color:var(--yellow);font-size:24px">${avgMin}</div>
        <div class="kpi-sub">משך ביקור ממוצע</div>
      </div>
      <div class="kpi">
        <div class="kpi-glow" style="background:var(--red)"></div>
        <div class="kpi-label">נטישה</div>
        <div class="kpi-value" style="color:var(--red);font-size:24px">${bounceP}</div>
        <div class="kpi-sub">bounce rate</div>
      </div>
    </div>

    <!-- Device breakdown -->
    <div class="device-row">
      <div class="device-card">
        <div class="device-icon">📱</div>
        <div>
          <div class="device-label">מובייל</div>
          <div class="device-val" style="color:var(--accent)">${fmt(mobile)}</div>
          <div class="device-pct">${pct(mobile,totalDev)}% מהכניסות</div>
        </div>
      </div>
      <div class="device-card">
        <div class="device-icon">🖥️</div>
        <div>
          <div class="device-label">מחשב</div>
          <div class="device-val" style="color:var(--accent2)">${fmt(desktop)}</div>
          <div class="device-pct">${pct(desktop,totalDev)}% מהכניסות</div>
        </div>
      </div>
      <div class="device-card">
        <div class="device-icon">📟</div>
        <div>
          <div class="device-label">טאבלט</div>
          <div class="device-val" style="color:var(--muted)">${fmt(tablet)}</div>
          <div class="device-pct">${pct(tablet,totalDev)}% מהכניסות</div>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card">
      <div class="card-hdr">
        <div class="card-title">פעילות יומית</div>
        <div class="card-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>כניסות</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>קליקים לחנויות</div>
        </div>
      </div>
      <div class="chart-wrap" id="chartWrap"></div>
    </div>

    <!-- Stores + Products -->
    <div class="two-col">
      <!-- Stores -->
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">קליקים לפי חנות</div>
        ${renderStores(stores)}
      </div>

      <!-- Products -->
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">מוצרים שנלחצו</div>
          <div style="font-size:11px;color:var(--muted)">${topProducts.length} מוצרים</div>
        </div>
        <div id="prodList">${renderProducts(topProducts, prodLimit)}</div>
        ${topProducts.length > prodLimit ? `<button class="show-more-btn" onclick="showMoreProds()">הצג עוד (${topProducts.length - prodLimit})</button>` : ''}
      </div>
    </div>
  `;

  drawChart(daily);
}

function renderStores(stores) {
  if (!stores.length) return '<div style="color:var(--muted);text-align:center;padding:20px;font-size:13px">אין נתוני קליקים עדיין</div>';
  const maxClicks = Math.max(...stores.map(s=>s.clicks), 1);
  const total = stores.reduce((a,s)=>a+s.clicks,0) || 1;
  return stores.map(s => {
    const w = Math.round(s.clicks/maxClicks*100);
    const p = Math.round(s.clicks/total*100);
    const srcLabel = s.dbClicks > 0 ? 'DB' : 'GA4';
    return `<div class="store-row">
      <div class="store-name">${esc(s.name)}</div>
      <div class="store-bar-wrap"><div class="store-bar-fill" style="width:${w}%"></div></div>
      <div class="store-count">${fmt(s.clicks)}</div>
      <div class="store-pct">${p}%</div>
      <div class="store-src">${srcLabel}</div>
    </div>`;
  }).join('');
}

function renderProducts(prods, limit) {
  if (!prods.length) return '<div style="color:var(--muted);text-align:center;padding:20px;font-size:13px">אין נתוני קליקים עדיין</div>';
  const maxClicks = Math.max(...prods.map(p=>p.clicks), 1);
  return prods.slice(0, limit).map((p, i) => {
    const w = Math.round(p.clicks/maxClicks*100);
    const imgEl = p.image
      ? `<img class="prod-img" src="${esc(p.image)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="prod-img-placeholder" style="${p.image?'display:none':''}">👗</div>`;
    return `<a class="prod-row" href="${esc(p.url||'#')}" target="_blank" rel="noopener">
      <div class="prod-rank">${i+1}</div>
      ${imgEl}${placeholder}
      <div class="prod-info">
        <div class="prod-title">${esc(p.title||'—')}</div>
        <div class="prod-store">${esc(p.store||'')}</div>
      </div>
      <div class="prod-bar"><div class="prod-bar-fill" style="width:${w}%"></div></div>
      <div class="prod-clicks">${p.clicks}</div>
    </a>`;
  }).join('');
}

function showMoreProds() {
  prodLimit += 20;
  const prods = _data?.topProducts || [];
  document.getElementById('prodList').innerHTML = renderProducts(prods, prodLimit);
  const btn = document.querySelector('.show-more-btn');
  if (btn) {
    if (prods.length <= prodLimit) btn.remove();
    else btn.textContent = `הצג עוד (${prods.length - prodLimit})`;
  }
}

function drawChart(daily) {
  const wrap = document.getElementById('chartWrap');
  if (!wrap || !daily?.length) return;
  const maxS = Math.max(...daily.map(d=>d.sessions), 1);
  const maxC = Math.max(...daily.map(d=>d.clicks||0), 1);
  const H = 144;
  wrap.innerHTML = daily.map(d => {
    const sh = Math.max(3, Math.round(d.sessions/maxS*H));
    const ch = Math.max(0, Math.round((d.clicks||0)/maxC*(H*0.5)));
    const label = d.date?.slice(5) || '';
    return `<div class="bar-col">
      <div class="bar-stack">
        <div class="bar-seg sessions" style="height:${sh}px" title="${d.date}: ${d.sessions} כניסות"></div>
        ${ch ? `<div class="bar-seg clicks" style="height:${ch}px" title="${d.date}: ${d.clicks} קליקים"></div>` : ''}
      </div>
      <div class="bar-label">${label}</div>
    </div>`;
  }).join('');
}

function fmt(n) { return n ? Number(n).toLocaleString('he-IL') : '0'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pct(v,t) { return t ? Math.round(v/t*100) : 0; }

// שחזור בחירת תאריך קודמת (אם הוגדרה) בטעינת הדף
(function initSince(){
  const s = getSince();
  if (s) {
    document.getElementById('periodSel').value = 'custom';
    document.getElementById('sinceInput').style.display = 'inline-block';
    document.getElementById('sinceInput').value = s;
  }
})();
loadData();
</script>
