<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKLI — דוח נתונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #c084fc;
    --accent2: #818cf8;
    --green: #34d399;
    --pink: #f472b6;
    --text: #f1f0ff;
    --muted: #6b7280;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(192,132,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(129,140,248,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }
  .logo {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .period-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    outline: none;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .kpi-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    border-radius: 50%;
    filter: blur(30px);
    opacity: 0.3;
  }
  .kpi-card:nth-child(1)::before { background: var(--accent); }
  .kpi-card:nth-child(2)::before { background: var(--green); }
  .kpi-card:nth-child(3)::before { background: var(--pink); }
  .kpi-card:nth-child(4)::before { background: var(--accent2); }
  .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .kpi-value { font-size: 36px; font-weight: 900; line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .kpi-trend { font-size: 12px; margin-top: 4px; }
  .trend-up { color: var(--green); }
  .trend-down { color: var(--pink); }

  /* Chart */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text);
  }
  .chart-wrap { height: 180px; display: flex; align-items: flex-end; gap: 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
    min-height: 4px;
    cursor: pointer;
    position: relative;
  }
  .bar:hover { opacity: 0.8; }
  .bar-label { font-size: 10px; color: var(--muted); white-space: nowrap; }

  /* Store table */
  .stores-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .store-row {
    display: flex;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .store-row:last-child { border-bottom: none; }
  .store-name { font-weight: 700; min-width: 100px; }
  .store-bar-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .store-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
  }
  .store-count { font-size: 14px; font-weight: 700; min-width: 60px; text-align: left; }
  .store-pct { font-size: 12px; color: var(--muted); min-width: 40px; text-align: left; }

  /* Top products */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .product-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
  }
  .product-row:hover { border-color: var(--accent); }
  .product-rank {
    font-size: 20px;
    font-weight: 900;
    color: var(--border);
    min-width: 28px;
  }
  .product-info { flex: 1; overflow: hidden; }
  .product-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-store { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .product-clicks {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    gap: 16px;
    color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(244,114,182,0.1);
    border: 1px solid var(--pink);
    border-radius: 12px;
    padding: 20px;
    color: var(--pink);
    text-align: center;
    margin: 20px 0;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Powered by */
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px 0;
  }
  .footer strong { color: var(--accent); }

  /* Preview token */
  .preview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .preview-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .preview-field { display: flex; flex-direction: column; gap: 6px; }
  .preview-field label { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .preview-field select, .preview-field input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px;
    font-family: 'Heebo', sans-serif; font-size: 14px; outline: none;
  }
  .preview-btn {
    padding: 10px 20px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 10px; cursor: pointer;
    font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700;
    transition: opacity 0.2s; white-space: nowrap;
  }
  .preview-btn:hover { opacity: 0.85; }
  .preview-result {
    margin-top: 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; display: flex; gap: 12px;
    align-items: center; flex-wrap: wrap;
  }
  .preview-url { flex: 1; font-size: 13px; color: var(--accent); word-break: break-all; }
  .copy-btn {
    padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; cursor: pointer;
    font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
    transition: border-color 0.2s; white-space: nowrap;
  }
  .copy-btn:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">LOOKLI</div>
    <div style="display:flex;align-items:center;gap:12px">
      <select class="period-select" id="periodSelect" onchange="loadData()">
        <option value="7">7 ימים אחרונים</option>
        <option value="28" selected>28 ימים אחרונים</option>
        <option value="90">90 ימים אחרונים</option>
      </select>
      <button onclick="testAlert('price')" style="padding:8px 14px;background:#c48cb3;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">🧪 בדיקת מחיר</button>
      <button onclick="testAlert('size')" style="padding:8px 14px;background:#7c6fcf;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">🧪 בדיקת מידה</button>
      <span class="badge">GA4</span>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>טוען נתונים מ-Google Analytics...</div>
    </div>
  </div>

  <!-- קישורי הצגה זמניים -->
  <div class="preview-card">
    <div class="card-title">🔗 קישורי הצגה זמניים לחנויות</div>
    <div class="preview-row">
      <div class="preview-field">
        <label>חנות</label>
        <select id="previewStore">
          <option value="MEKIMI">MEKIMI</option>
          <option value="LICHI">LICHI</option>
          <option value="MIMA">MIMA</option>
          <option value="AVIYAH">AVIYAH</option>
          <option value="CHEMISE">CHEMISE</option>
          <option value="CHEN">CHEN</option>
        </select>
      </div>
      <div class="preview-field">
        <label>תוקף (שעות)</label>
        <input type="number" id="previewHours" value="24" min="1" max="720" style="width:90px">
      </div>
      <button class="preview-btn" onclick="createPreviewLink()">⚡ צור קישור</button>
    </div>
    <div id="previewResult" style="display:none" class="preview-result">
      <div class="preview-url" id="previewUrl"></div>
      <button class="copy-btn" onclick="copyPreview()">📋 העתק</button>
      <a id="previewOpen" href="#" target="_blank" class="copy-btn">🔍 פתח</a>
    </div>
    <div id="previewExpiry" style="font-size:12px;color:var(--muted);margin-top:8px;display:none"></div>
  </div>

  <div class="footer">נתונים מאומתים על ידי <strong>Google Analytics</strong> · מופעל ע"י LOOKLI</div>
</div>

<script>
const GA_PROPERTY = '526435013';

async function loadData() {
  const days = document.getElementById('periodSelect').value;
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div><div>טוען נתונים...</div></div>`;
  try {
    const res = await fetch(`/api/analytics?days=${days}`);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    render(data, days);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error-msg">שגיאה בטעינת נתונים: ${e.message}<br><small>ודא שה-Service Account מחובר ל-GA4</small></div>`;
  }
}

function render(data, days) {
  const { totals, daily, stores, topProducts } = data;

  const html = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">כניסות לאתר</div>
        <div class="kpi-value" style="color:var(--accent)">${fmt(totals.sessions)}</div>
        <div class="kpi-sub">ב-${days} ימים אחרונים</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">משתמשים ייחודיים</div>
        <div class="kpi-value" style="color:var(--green)">${fmt(totals.users)}</div>
        <div class="kpi-sub">גולשים שונים</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">קליקים לחנויות</div>
        <div class="kpi-value" style="color:var(--pink)">${fmt(totals.outboundClicks)}</div>
        <div class="kpi-sub">יציאות לרכישה</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">צפיות בעמוד</div>
        <div class="kpi-value" style="color:var(--accent2)">${fmt(totals.pageViews)}</div>
        <div class="kpi-sub">סה"כ צפיות</div>
      </div>
    </div>

    <!-- Daily chart -->
    <div class="chart-card">
      <div class="card-title">כניסות יומיות לאתר</div>
      <div class="chart-wrap" id="chartWrap"></div>
    </div>

    <!-- Stores -->
    <div class="stores-card">
      <div class="card-title">קליקים לפי חנות</div>
      ${stores.length === 0 ? '<div style="color:var(--muted);text-align:center;padding:20px">אין נתוני קליקים עדיין</div>' :
        stores.map(s => {
          const pct = totals.outboundClicks > 0 ? Math.round(s.clicks / totals.outboundClicks * 100) : 0;
          return `<div class="store-row">
            <div class="store-name">${s.name}</div>
            <div class="store-bar-wrap"><div class="store-bar-fill" style="width:${pct}%"></div></div>
            <div class="store-count">${fmt(s.clicks)} קליקים</div>
            <div class="store-pct">${pct}%</div>
          </div>`;
        }).join('')
      }
    </div>

    <!-- Top products -->
    ${topProducts.length > 0 ? `
    <div class="section-title">מוצרים שנלחצו הכי הרבה</div>
    <div class="products-grid">
      ${topProducts.slice(0,6).map((p,i) => `
        <div class="product-row">
          <div class="product-rank">#${i+1}</div>
          <div class="product-info">
            <div class="product-title">${esc(p.title)}</div>
            <div class="product-store">${esc(p.store)}</div>
          </div>
          <div class="product-clicks">${p.clicks}</div>
        </div>
      `).join('')}
    </div>` : ''}
  `;

  document.getElementById('content').innerHTML = html;

  // Draw chart
  if (daily && daily.length > 0) {
    const max = Math.max(...daily.map(d => d.sessions), 1);
    const wrap = document.getElementById('chartWrap');
    wrap.innerHTML = daily.map(d => `
      <div class="bar-col">
        <div class="bar" style="height:${Math.max(4, Math.round(d.sessions/max*160))}px" title="${d.date}: ${d.sessions} כניסות"></div>
        <div class="bar-label">${d.date.substring(5)}</div>
      </div>
    `).join('');
  }
}

function fmt(n) {
  if (!n) return '0';
  return Number(n).toLocaleString('he-IL');
}
function esc(s) {
  return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadData();

  async function testAlert(type) {
    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    const r = await fetch('/api/admin/test-alert' + (pwd ? '?pwd='+encodeURIComponent(pwd) : ''), {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type })
    });
    const d = await r.json();
    if (d.ok) alert('✅ מייל ' + (type==='price'?'מחיר':'מידה') + ' נשלח ל: ' + d.sent_to + '\nמוצר: ' + d.product);
    else alert('❌ ' + (d.msg || JSON.stringify(d.error) || 'שגיאה'));
  }

  async function createPreviewLink() {
    const store = document.getElementById('previewStore').value;
    const hours = parseInt(document.getElementById('previewHours').value) || 24;
    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    try {
      const r = await fetch('/api/admin/preview-token' + (pwd ? '?pwd='+encodeURIComponent(pwd) : ''), {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ store, hours })
      });
      const d = await r.json();
      if (!d.ok) { alert('❌ ' + (d.error || 'שגיאה')); return; }
      document.getElementById('previewUrl').textContent = d.url;
      document.getElementById('previewOpen').href = d.url;
      document.getElementById('previewResult').style.display = 'flex';
      const exp = new Date(d.expiresAt);
      document.getElementById('previewExpiry').style.display = 'block';
      document.getElementById('previewExpiry').textContent =
        `⏱ פג תוקף: ${exp.toLocaleDateString('he-IL')} ${exp.toLocaleTimeString('he-IL')} (${hours} שעות)`;
    } catch(e) {
      alert('❌ שגיאה: ' + e.message);
    }
  }

  function copyPreview() {
    const url = document.getElementById('previewUrl').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ הועתק!';
      setTimeout(() => btn.textContent = '📋 העתק', 2000);
    });
  }
</script>
</body>
</html>
