<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOKLI — דוח נתונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #c084fc;
    --accent2: #818cf8;
    --green: #34d399;
    --pink: #f472b6;
    --text: #f1f0ff;
    --muted: #6b7280;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(192,132,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(129,140,248,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }
  .logo {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .period-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    outline: none;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .kpi-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    border-radius: 50%;
    filter: blur(30px);
    opacity: 0.3;
  }
  .kpi-card:nth-child(1)::before { background: var(--accent); }
  .kpi-card:nth-child(2)::before { background: var(--green); }
  .kpi-card:nth-child(3)::before { background: var(--pink); }
  .kpi-card:nth-child(4)::before { background: var(--accent2); }
  .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .kpi-value { font-size: 36px; font-weight: 900; line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .kpi-trend { font-size: 12px; margin-top: 4px; }
  .trend-up { color: var(--green); }
  .trend-down { color: var(--pink); }

  /* Chart */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text);
  }
  .chart-wrap { height: 180px; display: flex; align-items: flex-end; gap: 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
    min-height: 4px;
    cursor: pointer;
    position: relative;
  }
  .bar:hover { opacity: 0.8; }
  .bar-label { font-size: 10px; color: var(--muted); white-space: nowrap; }

  /* Store table */
  .stores-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
  }
  .store-row {
    display: flex;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .store-row:last-child { border-bottom: none; }
  .store-name { font-weight: 700; min-width: 100px; }
  .store-bar-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .store-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
  }
  .store-count { font-size: 14px; font-weight: 700; min-width: 60px; text-align: left; }
  .store-pct { font-size: 12px; color: var(--muted); min-width: 40px; text-align: left; }

  /* Top products */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .product-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
  }
  .product-row:hover { border-color: var(--accent); }
  .product-rank {
    font-size: 20px;
    font-weight: 900;
    color: var(--border);
    min-width: 28px;
  }
  .product-info { flex: 1; overflow: hidden; }
  .product-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-store { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .product-clicks {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    gap: 16px;
    color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(244,114,182,0.1);
    border: 1px solid var(--pink);
    border-radius: 12px;
    padding: 20px;
    color: var(--pink);
    text-align: center;
    margin: 20px 0;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Powered by */
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px 0;
  }
  .footer strong { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">LOOKLI</div>
    <div style="display:flex;align-items:center;gap:12px">
      <select class="period-select" id="periodSelect" onchange="loadData()">
        <option value="7">7 ימים אחרונים</option>
        <option value="28" selected>28 ימים אחרונים</option>
        <option value="90">90 ימים אחרונים</option>
      </select>
      <button onclick="testAlert('price')" style="padding:8px 14px;background:#c48cb3;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">🧪 בדיקת מחיר</button>
      <button onclick="testAlert('size')" style="padding:8px 14px;background:#7c6fcf;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">🧪 בדיקת מידה</button>
      <a href="/admin/tasks" style="padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#9ca3af;font-size:12px;text-decoration:none">✅ משימות</a>
      <span class="badge">GA4</span>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>טוען נתונים מ-Google Analytics...</div>
    </div>
  </div>

  <div class="footer">נתונים מאומתים על ידי <strong>Google Analytics</strong> · מופעל ע"י LOOKLI</div>
</div>

<script>
const GA_PROPERTY = '526435013';

async function loadData() {
  const days = document.getElementById('periodSelect').value;
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div><div>טוען נתונים...</div></div>`;
  try {
    const res = await fetch(`/api/analytics?days=${days}`);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    render(data, days);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error-msg">שגיאה בטעינת נתונים: ${e.message}<br><small>ודא שה-Service Account מחובר ל-GA4</small></div>`;
  }
}

function render(data, days) {
  const { totals, daily, stores, topProducts } = data;

  const html = `
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">כניסות לאתר</div>
        <div class="kpi-value" style="color:var(--accent)">${fmt(totals.sessions)}</div>
        <div class="kpi-sub">ב-${days} ימים אחרונים</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">משתמשים ייחודיים</div>
        <div class="kpi-value" style="color:var(--green)">${fmt(totals.users)}</div>
        <div class="kpi-sub">גולשים שונים</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">קליקים לחנויות</div>
        <div class="kpi-value" style="color:var(--pink)">${fmt(totals.outboundClicks)}</div>
        <div class="kpi-sub">יציאות לרכישה</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">צפיות בעמוד</div>
        <div class="kpi-value" style="color:var(--accent2)">${fmt(totals.pageViews)}</div>
        <div class="kpi-sub">סה"כ צפיות</div>
      </div>
    </div>

    <!-- Daily chart -->
    <div class="chart-card">
      <div class="card-title">כניסות יומיות לאתר</div>
      <div class="chart-wrap" id="chartWrap"></div>
    </div>

    <!-- Stores -->
    <div class="stores-card">
      <div class="card-title">קליקים לפי חנות</div>
      ${stores.length === 0 ? '<div style="color:var(--muted);text-align:center;padding:20px">אין נתוני קליקים עדיין</div>' :
        stores.map(s => {
          const pct = totals.outboundClicks > 0 ? Math.round(s.clicks / totals.outboundClicks * 100) : 0;
          return `<div class="store-row">
            <div class="store-name">${s.name}</div>
            <div class="store-bar-wrap"><div class="store-bar-fill" style="width:${pct}%"></div></div>
            <div class="store-count">${fmt(s.clicks)} קליקים</div>
            <div class="store-pct">${pct}%</div>
          </div>`;
        }).join('')
      }
    </div>

    <!-- Top products -->
    ${topProducts.length > 0 ? `
    <div class="section-title">מוצרים שנלחצו הכי הרבה</div>
    <div class="products-grid">
      ${topProducts.slice(0,6).map((p,i) => `
        <div class="product-row">
          <div class="product-rank">#${i+1}</div>
          <div class="product-info">
            <div class="product-title">${esc(p.title)}</div>
            <div class="product-store">${esc(p.store)}</div>
          </div>
          <div class="product-clicks">${p.clicks}</div>
        </div>
      `).join('')}
    </div>` : ''}
  `;

  document.getElementById('content').innerHTML = html;

  // Draw chart
  if (daily && daily.length > 0) {
    const max = Math.max(...daily.map(d => d.sessions), 1);
    const wrap = document.getElementById('chartWrap');
    wrap.innerHTML = daily.map(d => `
      <div class="bar-col">
        <div class="bar" style="height:${Math.max(4, Math.round(d.sessions/max*160))}px" title="${d.date}: ${d.sessions} כניסות"></div>
        <div class="bar-label">${d.date.substring(5)}</div>
      </div>
    `).join('');
  }
}

function fmt(n) {
  if (!n) return '0';
  return Number(n).toLocaleString('he-IL');
}
function esc(s) {
  return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadData();

  async function testAlert(type) {
    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    const r = await fetch('/api/admin/test-alert' + (pwd ? '?pwd='+encodeURIComponent(pwd) : ''), {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type })
    });
    const d = await r.json();
    if (d.ok) alert('✅ מייל ' + (type==='price'?'מחיר':'מידה') + ' נשלח ל: ' + d.sent_to + '\nמוצר: ' + d.product);
    else alert('❌ ' + (d.msg || JSON.stringify(d.error) || 'שגיאה'));
  }

  // ── Simulate change ──
  async function loadAlertProducts() {
    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    const r = await fetch('/api/alerts/all' + (pwd ? '?pwd='+encodeURIComponent(pwd) : ''), { credentials: 'include' });
    if (!r.ok) return [];
    const d = await r.json();
    return d.alerts || [];
  }

  async function simulateChange() {
    const type = document.getElementById('simType').value;
    const url  = document.getElementById('simUrl').value.trim();
    const price = document.getElementById('simPrice').value.trim();
    const size  = document.getElementById('simSize').value.trim();

    if (!url) return alert('הזן URL מוצר');
    if (type === 'price' && !price) return alert('הזן מחיר חדש');
    if (type === 'size' && !size) return alert('הזן מידה');

    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    const r = await fetch('/api/admin/simulate-change' + (pwd ? '?pwd='+encodeURIComponent(pwd) : ''), {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, product_source_url: url,
        new_price: price || null, remove_size: size || null })
    });
    const d = await r.json();
    const box = document.getElementById('simResult');
    if (d.ok) {
      box.style.color = '#22c55e';
      box.textContent = d.results.map(r =>
        r.sent ? '✅ נשלח ל-' + r.email + ' (' + (r.type==='price' ? '₪'+r.oldVal+'→₪'+r.newVal : 'מידה '+r.newVal) + ')'
               : '⚠️ לא הופעל: ' + r.reason
      ).join(' | ');
    } else {
      box.style.color = '#ef4444';
      box.textContent = '❌ ' + (d.msg || d.error || 'שגיאה');
    }
  }

  // טען URLים של מוצרים עם התראות לdropdown
  async function fillAlertUrls() {
    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    try {
      const r = await fetch('/api/admin/alert-urls' + (pwd ? '?pwd='+encodeURIComponent(pwd) : ''), { credentials: 'include' });
      if (!r.ok) return;
      const d = await r.json();
      const sel = document.getElementById('simUrl');
      sel.innerHTML = '<option value="">-- בחר מוצר --</option>' +
        d.items.map(x => '<option value="'+x.url+'">'+x.title+' ('+x.store+')</option>').join('');
    } catch(e) {}
  }
  // ── Preview Tokens ──
  async function createPreviewToken() {
    const label = document.getElementById('ptLabel').value.trim();
    const hours = parseInt(document.getElementById('ptHours').value) || 24;
    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    const r = await fetch('/api/admin/preview-token' + (pwd?'?pwd='+encodeURIComponent(pwd):''), {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label, hours })
    });
    const d = await r.json();
    const box = document.getElementById('ptResult');
    if (d.ok) {
      box.innerHTML = '<div style="background:#0f2a1a;border:1px solid #22c55e;border-radius:8px;padding:12px">'
        + '<div style="color:#22c55e;font-weight:700;margin-bottom:6px">✅ קישור נוצר! תוקף עד: ' + new Date(d.expires_at).toLocaleString('he-IL') + '</div>'
        + '<div style="display:flex;gap:8px;align-items:center">'
        + '<input value="' + d.url + '" readonly style="flex:1;padding:6px 10px;background:#1a1a2e;border:1px solid #22c55e;border-radius:6px;color:#e2e8f0;font-size:12px"/>'
        + '<button onclick="navigator.clipboard.writeText(this.dataset.url);this.textContent=\'✓ הועתק!\'" data-url="' + d.url + '" style="padding:6px 12px;background:#22c55e;border:none;border-radius:6px;color:#000;font-weight:700;cursor:pointer;font-size:12px">העתק</button>'
        + '</div></div>';
      loadPreviewTokens();
    } else {
      box.innerHTML = '<div style="color:#ef4444">❌ ' + (d.error||'שגיאה') + '</div>';
    }
  }

  async function loadPreviewTokens() {
    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    try {
      const r = await fetch('/api/admin/preview-tokens' + (pwd?'?pwd='+encodeURIComponent(pwd):''), { credentials: 'include' });
      const d = await r.json();
      const list = document.getElementById('ptList');
      if (!d.tokens || d.tokens.length === 0) { list.textContent = 'אין קישורים פעילים'; return; }
      const now = new Date();
      list.innerHTML = '<table style="width:100%;border-collapse:collapse">'
        + '<tr style="color:#6b7280;border-bottom:1px solid rgba(255,255,255,.05)">'
        + '<th style="text-align:right;padding:6px 4px;font-weight:500">תיאור</th>'
        + '<th style="text-align:right;padding:6px 4px;font-weight:500">תפוגה</th>'
        + '<th style="text-align:right;padding:6px 4px;font-weight:500">שימושים</th>'
        + '<th></th></tr>'
        + d.tokens.map(t => {
          const exp = new Date(t.expires_at);
          const active = exp > now;
          const hoursLeft = Math.max(0, Math.round((exp - now) / 36e5));
          return '<tr style="border-bottom:1px solid rgba(255,255,255,.04)">'
            + '<td style="padding:7px 4px;color:' + (active?'#e2e8f0':'#6b7280') + '">' + (t.label||'—') + '</td>'
            + '<td style="padding:7px 4px;color:' + (active?'#22c55e':'#ef4444') + '">' + (active ? 'עוד ' + hoursLeft + 'ש'' : 'פג תוקף') + '</td>'
            + '<td style="padding:7px 4px;color:#9ca3af;text-align:center">' + (t.uses||0) + '</td>'
            + '<td style="padding:7px 4px;text-align:left">'
            + '<button onclick="deleteToken('' + t.token + '')" style="padding:3px 8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:4px;color:#ef4444;cursor:pointer;font-size:11px">ביטול</button>'
            + '</td></tr>';
        }).join('') + '</table>';
    } catch(e) { document.getElementById('ptList').textContent = 'שגיאה בטעינה'; }
  }

  async function deleteToken(token) {
    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    await fetch('/api/admin/preview-token/' + token + (pwd?'?pwd='+encodeURIComponent(pwd):''), {
      method: 'DELETE', credentials: 'include' });
    loadPreviewTokens();
  }

  loadPreviewTokens();
  fillAlertUrls();

  async function runDbTest() {
    const url   = document.getElementById('simUrl').value;
    const price = document.getElementById('dbTestPrice').value;
    const sizes = document.getElementById('dbTestSize').value;
    if (!url) return alert('בחר מוצר מהרשימה');
    if (!price && !sizes) return alert('הזן מחיר חדש או מידות חדשות');

    const pwd = new URLSearchParams(location.search).get('pwd') || '';
    const body = { product_source_url: url };
    if (price) body.new_price = parseFloat(price);
    if (sizes) body.new_sizes = sizes.split(',').map(s => s.trim()).filter(Boolean);

    const r = await fetch('/api/admin/db-test-alert' + (pwd ? '?pwd='+encodeURIComponent(pwd) : ''), {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    const box = document.getElementById('dbTestResult');
    if (d.ok) {
      box.style.color = d.sent > 0 ? '#22c55e' : '#f59e0b';
      box.textContent = 'נשלחו: ' + d.sent + ' התראות\n'
        + (d.changes.price ? 'מחיר: ' + d.changes.price + '\n' : '')
        + (d.changes.sizes ? 'מידות: ' + d.changes.sizes + '\n' : '')
        + d.results.map(x => x.sent
            ? '✅ ' + x.type + ' → ' + x.email
            : '⚠️ ' + x.type + ': ' + x.reason
          ).join('\n');
    } else {
      box.style.color = '#ef4444';
      box.textContent = '❌ ' + (d.msg || d.error);
    }
  }

</script>
